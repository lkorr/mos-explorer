<script>
// ================================================================
//  DATA — Temperament functions (data in mos-data.js)
// ================================================================

function getTemperamentsForMOS(key, regionLow, regionHigh) {
  const results = [];
  for (let i = 0; i < TEMPERAMENTS.length; i++) {
    const t = TEMPERAMENTS[i];
    if (t.disabled) continue;
    const mosList = Array.isArray(t.mos) ? t.mos : [t.mos];
    const directMatch = mosList.includes(key) || mosList.some(m => isDescendantMOS(key, m));
    const ancestorMatch = !directMatch && mosList.some(m => isDescendantMOS(m, key));
    if (!directMatch && !ancestorMatch) continue;
    const period = t.period || 1200;
    const mirror = [period - t.genRange[1], period - t.genRange[0]];

    if (ancestorMatch) {
      const directIn = t.genRange[0] < regionHigh && t.genRange[1] > regionLow;
      const mirrorIn = mirror[0] < regionHigh && mirror[1] > regionLow;
      results.push({ ...t, effectiveRange: directIn ? t.genRange : mirror, _idx: i });
    } else {
      const directOverlap = regionLow === undefined ||
        (t.genRange[0] < regionHigh && t.genRange[1] > regionLow);
      const mirrorOverlap = regionLow !== undefined &&
        mirror[0] < regionHigh && mirror[1] > regionLow;
      if (directOverlap) {
        results.push({ ...t, effectiveRange: t.genRange, _idx: i });
      }
      if (mirrorOverlap) {
        results.push({ ...t, effectiveRange: mirror, _idx: i });
      }
    }
  }
  return results;
}

function getTemperamentsAtCursor(key, cents, regionLow, regionHigh) {
  return getTemperamentsForMOS(key, regionLow, regionHigh)
    .filter(t => cents >= t.effectiveRange[0] && cents <= t.effectiveRange[1]);
}

function getModeName(key, genCents, modeRotation) {
  const modes = MODE_NAMES[key];
  if (!modes || genCents === null) return null;
  const n = parseInt(key.split('L')[0]) + parseInt(key.split('_')[1]);
  const chain = getGeneratorChain(genCents, n);
  const rootGenIndex = chain[modeRotation];
  const dark = genCents < 600;
  const modeIdx = dark ? (n - 1 - rootGenIndex) : rootGenIndex;
  if (modeIdx < modes.length) return modes[modeIdx];
  return null;
}

// ================================================================
//  DATA — Palette
// ================================================================

const PALETTE = [
  '#e94560','#6eb5ff','#50c878','#f5a623','#bb86fc',
  '#ff6f91','#00c9a7','#ffc75f','#845ec2','#d65db1',
  '#ff9671','#2ec4b6','#e0aaff','#c9184a','#588157',
  '#a7c957','#f4845f','#277da1','#f94144','#43aa8b',
  '#577590','#f8961e','#90be6d','#f9844a','#4cc9f0',
  '#7209b7','#3a0ca3','#4361ee','#4895ef','#560bad',
];

// ================================================================
//  MATH — MOS core
// ================================================================

function gcd(a, b) {
  a = Math.abs(a); b = Math.abs(b);
  while (b) { [a, b] = [b, a % b]; }
  return a;
}

function findParentMOS(nL, nS) {
  if (nL === nS || (nL <= 1 && nS <= 1)) return null;
  if (nL > nS) return `${nS}L_${nL - nS}s`;
  return `${nL}L_${nS - nL}s`;
}

function getChildMOSes(key) {
  const m = key.match(/(\d+)L_(\d+)s/);
  if (!m) return [];
  const nL = +m[1], nS = +m[2];
  return [`${nL + nS}L_${nL}s`, `${nL}L_${nL + nS}s`];
}

function isDescendantMOS(childKey, ancestorKey) {
  let cur = childKey;
  for (let i = 0; i < 30; i++) {
    const m = cur.match(/(\d+)L_(\d+)s/);
    if (!m) return false;
    const parent = findParentMOS(+m[1], +m[2]);
    if (!parent) return false;
    if (parent === ancestorKey) return true;
    cur = parent;
  }
  return false;
}

function buildMOSRegions(maxSize, maxDepth) {
  const regions = [];
  const edoColorMap = {};
  let ci = 0;
  function color(nL) {
    if (!(nL in edoColorMap)) { edoColorMap[nL] = PALETTE[ci++ % PALETTE.length]; }
    return edoColorMap[nL];
  }

  function addRegion(nL, nS, size, fp1, fq1, fp2, fq2, depth) {
    const lowCents = (fp1 / fq1) * 1200;
    const highCents = (fp2 / fq2) * 1200;
    if (highCents - lowCents < 0.001) return;

    const key = `${nL}L_${nS}s`;
    const collapsedColor = color(nL);
    const equalizedColor = color(size);
    regions.push({
      key, nL, nS, size,
      lowCents, highCents,
      lowFrac: [fp1, fq1], highFrac: [fp2, fq2],
      color: collapsedColor,
      collapsedColor, equalizedColor,
      depth,
      parent: findParentMOS(nL, nS),
    });

    regions.push({
      key, nL, nS, size,
      lowCents: 1200 - highCents,
      highCents: 1200 - lowCents,
      lowFrac: [fq2 - fp2, fq2], highFrac: [fq1 - fp1, fq1],
      color: collapsedColor,
      collapsedColor, equalizedColor,
      depth,
      parent: findParentMOS(nL, nS),
      isMirror: true,
    });
  }

  function traverse(lp, lq, rp, rq, depth) {
    if (depth <= 0) return;
    const mp = lp + rp, mq = lq + rq;
    if (mq > maxSize) return;
    addRegion(lq, rq, mq, lp, lq, mp, mq, maxDepth - depth + 1);
    addRegion(rq, lq, mq, mp, mq, rp, rq, maxDepth - depth + 1);
    traverse(lp, lq, mp, mq, depth - 1);
    traverse(mp, mq, rp, rq, depth - 1);
  }

  if (maxSize >= 2) addRegion(1, 1, 2, 0, 1, 1, 2, 0);
  traverse(0, 1, 1, 2, maxDepth);
  return { regions: regions.filter(r => r.size >= 2 && r.size <= maxSize), colorMap: edoColorMap };
}

function computeHardness(genCents, mosSize) {
  const P = 1200, N = mosSize;
  const pos = [];
  for (let i = 0; i < N; i++) pos.push(((i * genCents) % P + P) % P);
  pos.sort((a, b) => a - b);

  const steps = [];
  for (let i = 0; i < N; i++) {
    steps.push(i < N - 1 ? pos[i + 1] - pos[i] : P - pos[N - 1] + pos[0]);
  }

  const sorted = [...new Set(steps.map(x => Math.round(x * 100) / 100))].sort((a, b) => b - a);
  if (sorted.length < 2) { const v = sorted[0] || 0; return { L: v, s: v, ratio: 1, str: '1.00' }; }

  const L = sorted[0], s = sorted[sorted.length - 1];
  if (s < 0.01) return { L, s: 0, ratio: Infinity, str: '∞:1' };

  const ratio = L / s;
  const str = ratio.toFixed(2);
  return { L, s, ratio, str };
}

function buildEDOGenerators(maxEDO) {
  const gens = [];
  for (let n = 2; n <= maxEDO; n++) {
    for (let m = 1; m < n; m++) {
      if (gcd(m, n) !== 1) continue;
      gens.push({ step: m, edo: n, cents: (m / n) * 1200 });
    }
  }
  return gens;
}

function buildMOSScale(genCents, n, period) {
  period = period || 1200;
  const pitches = [0];
  for (let i = 1; i < n; i++) {
    pitches.push(((i * genCents) % period + period) % period);
  }
  pitches.sort((a, b) => a - b);

  const steps = [];
  for (let i = 0; i < n; i++) {
    const next = (i + 1) % n;
    const diff = next === 0 ? period - pitches[n - 1] + pitches[0] : pitches[next] - pitches[i];
    steps.push(diff);
  }

  const sorted = [...new Set(steps.map(x => Math.round(x * 100) / 100))].sort((a, b) => b - a);
  const L = sorted[0] || 0;
  const s = sorted.length > 1 ? sorted[sorted.length - 1] : L;

  return { pitches, steps, L, s };
}

function getGeneratorChain(genCents, n, period) {
  period = period || 1200;
  const raw = [];
  for (let i = 0; i < n; i++) {
    raw.push({ genIndex: i, cents: ((i * genCents) % period + period) % period });
  }
  raw.sort((a, b) => a.cents - b.cents);
  return raw.map(r => r.genIndex);
}

function computeUDP(genCents, n, modeRotation, period) {
  period = period || 1200;
  const chain = getGeneratorChain(genCents, n, period);
  const rootGenIndex = chain[modeRotation];
  const dark = genCents < period / 2;
  const u = dark ? rootGenIndex : (n - 1 - rootGenIndex);
  const d = dark ? (n - 1 - rootGenIndex) : rootGenIndex;
  return `${u}|${d}`;
}

function computeStepPattern(genCents, n, modeRotation, period) {
  period = period || 1200;
  const baseScale = buildMOSScale(genCents, n, period);
  const scale = rotateMOSScale(baseScale, modeRotation, period);
  return scale.steps.map(st => Math.abs(st - scale.L) < 0.5 ? 'L' : 's').join('');
}

function rotateByGenerator(genCents, n, currentRotation, direction, period) {
  period = period || 1200;
  const chain = getGeneratorChain(genCents, n, period);
  const currentGenIndex = chain[currentRotation];
  const targetGenIndex = ((currentGenIndex - direction) % n + n) % n;
  return chain.indexOf(targetGenIndex);
}

function rotateMOSScale(scale, rotation, period) {
  period = period || 1200;
  const n = scale.pitches.length;
  if (rotation === 0) return scale;
  const root = scale.pitches[rotation % n];
  const pitches = [];
  for (let i = 0; i < n; i++) {
    const idx = (i + rotation) % n;
    const p = ((scale.pitches[idx] - root) % period + period) % period;
    pitches.push(p);
  }
  pitches.sort((a, b) => a - b);

  const steps = [];
  for (let i = 0; i < n; i++) {
    const next = (i + 1) % n;
    const diff = next === 0 ? period - pitches[n - 1] + pitches[0] : pitches[next] - pitches[i];
    steps.push(diff);
  }

  const sorted = [...new Set(steps.map(x => Math.round(x * 100) / 100))].sort((a, b) => b - a);
  const L = sorted[0] || 0;
  const s = sorted.length > 1 ? sorted[sorted.length - 1] : 0;

  return { pitches, steps, L, s };
}

function getEqualizedEnd(region) {
  const lo = region.lowCents + 0.01;
  const hi = region.highCents - 0.01;
  const hrLo = computeHardness(lo, region.size);
  const hrHi = computeHardness(hi, region.size);
  return hrLo.ratio < hrHi.ratio ? 'low' : 'high';
}

// ================================================================
//  STATE
// ================================================================

const S = {
  viewMin: 0, viewMax: 1200,
  maxSize: 18, maxEDO: 53, minSize: 2,
  regions: [], colorMap: {}, edos: [],
  hovered: null, selected: null,
  generatorCents: null,
  modeRotation: 0,
  dragging: false, dragX0: 0, dragY0: 0, dragMin0: 0, dragMax0: 0, dragMinSize0: 0,
  genDragging: false,
  sliderDragging: false,
  sizeSbDragging: false,
  canvas: null, ctx: null, dpr: 1, W: 0, H: 0,
  _parentArrow: null, _childArrow: null, _modeButtons: [], _lastClickX: undefined, _lastClickY: undefined,
  _tempBars: [],
  rulerSort: 'degree',
  _circleRadius: null,
  circleResizing: false, circleResizeStartX: 0, circleResizeStartY: 0, circleResizeStartR: 0,
};

function recalc() {
  const oldSel = S.selected;
  const { regions, colorMap } = buildMOSRegions(S.maxSize, S.maxSize);
  S.regions = regions;
  S.colorMap = colorMap;
  S.edos = buildEDOGenerators(S.maxEDO);
  if (oldSel) {
    S.selected = regions.find(r =>
      r.key === oldSel.key &&
      Math.abs(r.lowCents - oldSel.lowCents) < 0.01 &&
      Math.abs(r.highCents - oldSel.highCents) < 0.01
    ) || null;
  }
  updatePanel();
  render();
}

// ================================================================
//  UTIL — Coordinates & Color
// ================================================================

const MARGIN = 24;
function c2x(c) { return MARGIN + ((c - S.viewMin) / (S.viewMax - S.viewMin)) * (S.W - 2 * MARGIN); }
function x2c(x) { return S.viewMin + ((x - MARGIN) / (S.W - 2 * MARGIN)) * (S.viewMax - S.viewMin); }

function hexA(hex, a) {
  return `rgba(${parseInt(hex.slice(1,3),16)},${parseInt(hex.slice(3,5),16)},${parseInt(hex.slice(5,7),16)},${a})`;
}
function hexToRGB(hex) {
  return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
}
function rgbToHex(r, g, b) {
  return '#' + [r,g,b].map(v => Math.round(Math.max(0,Math.min(255,v))).toString(16).padStart(2,'0')).join('');
}
function lerpColor(hex1, hex2, t) {
  const [r1,g1,b1] = hexToRGB(hex1);
  const [r2,g2,b2] = hexToRGB(hex2);
  return rgbToHex(r1+(r2-r1)*t, g1+(g2-g1)*t, b1+(b2-b1)*t);
}
function complementaryColor(hex) {
  const [r, g, b] = hexToRGB(hex);
  return rgbToHex(255 - r, 255 - g, 255 - b);
}


// ================================================================
//  RENDER — Main dispatcher
// ================================================================

function render() {
  const { ctx, W, H, dpr } = S;
  ctx.save();
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, W, H);

  const vr = S.viewMax - S.viewMin;

  drawAxis(ctx, W, H, vr);
  drawEDOs(ctx, W, H, vr);
  S._tempRows = 0;
  if (S.selected) drawTemperaments(ctx, W, H);
  drawMOS(ctx, W, H, vr);
  if (S.selected && S.generatorCents !== null) drawGeneratorMarker(ctx, W, H);
  if (S.selected) {
    drawMOSCircle(ctx, W, H);
    positionPanel();
    renderEDOGrid();
  }
  // drawSizeScrollbar(ctx, W, H);

  ctx.restore();
}

// ================================================================
//  RENDER — Left Size Scrollbar
// ================================================================

const SIZE_SB_WIDTH = 14;
const SIZE_SB_MARGIN_TOP = 64;
const SIZE_SB_MARGIN_BOTTOM = 40;

function getSizeScrollbarGeometry(H) {
  const x = 3;
  const trackTop = SIZE_SB_MARGIN_TOP;
  const trackBottom = H - SIZE_SB_MARGIN_BOTTOM;
  const trackH = trackBottom - trackTop;
  const minVal = 2, maxVal = 30;
  const range = maxVal - minVal;
  const t = (S.minSize - minVal) / range;
  const thumbY = trackTop + t * (trackH - 20);
  return { x, trackTop, trackBottom, trackH, thumbY, thumbH: 20 };
}

function drawSizeScrollbar(ctx, W, H) {
  const { x, trackTop, trackBottom, trackH, thumbY, thumbH } = getSizeScrollbarGeometry(H);

  ctx.fillStyle = '#0d1b2a';
  ctx.fillRect(x, trackTop, SIZE_SB_WIDTH, trackH);
  ctx.strokeStyle = '#2a3a5a';
  ctx.lineWidth = 1;
  ctx.strokeRect(x + 0.5, trackTop + 0.5, SIZE_SB_WIDTH - 1, trackH - 1);

  ctx.fillStyle = S.sizeSbDragging ? '#e94560' : '#5a6a8a';
  const r = 3;
  const tx = x, ty = thumbY, tw = SIZE_SB_WIDTH, th = thumbH;
  ctx.beginPath();
  ctx.moveTo(tx + r, ty);
  ctx.lineTo(tx + tw - r, ty);
  ctx.quadraticCurveTo(tx + tw, ty, tx + tw, ty + r);
  ctx.lineTo(tx + tw, ty + th - r);
  ctx.quadraticCurveTo(tx + tw, ty + th, tx + tw - r, ty + th);
  ctx.lineTo(tx + r, ty + th);
  ctx.quadraticCurveTo(tx, ty + th, tx, ty + th - r);
  ctx.lineTo(tx, ty + r);
  ctx.quadraticCurveTo(tx, ty, tx + r, ty);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = '#aab';
  ctx.font = '9px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(S.minSize, x + SIZE_SB_WIDTH / 2, thumbY + thumbH / 2 + 3);
}

function hitSizeScrollbar(mx, my) {
  return false;
}

function setSizeFromScrollbarY(my) {
  const geo = getSizeScrollbarGeometry(S.H);
  const t = Math.max(0, Math.min(1, (my - geo.trackTop - 10) / (geo.trackH - 20)));
  const newMin = Math.round(2 + t * 28);
  if (newMin !== S.minSize) {
    S.minSize = newMin;
    document.getElementById('min-size').value = S.minSize;
    document.getElementById('min-size-val').textContent = S.minSize;
    if (S.minSize > S.maxSize) {
      S.maxSize = S.minSize;
      document.getElementById('max-mos-size').value = S.maxSize;
      document.getElementById('max-mos-val').textContent = S.maxSize;
      recalc();
    } else {
      render();
    }
  }
}

// ================================================================
//  RENDER — Axis
// ================================================================

function drawAxis(ctx, W, H, vr) {
  const Y = 44;
  let tick;
  if (vr > 800) tick = 100;
  else if (vr > 400) tick = 50;
  else if (vr > 200) tick = 20;
  else if (vr > 80) tick = 10;
  else if (vr > 30) tick = 5;
  else if (vr > 10) tick = 2;
  else if (vr > 3) tick = 1;
  else tick = 0.5;

  const start = Math.ceil(S.viewMin / tick) * tick;
  for (let c = start; c <= S.viewMax; c += tick) {
    const x = c2x(c);
    ctx.strokeStyle = '#1f1f3a';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x, Y); ctx.lineTo(x, H); ctx.stroke();
  }

  const barH = 16;
  ctx.fillStyle = '#3a3a5c';
  ctx.fillRect(0, Y - barH/2, W, barH);
  ctx.strokeStyle = '#556';
  ctx.lineWidth = 1;
  ctx.strokeRect(0, Y - barH/2, W, barH);

  ctx.fillStyle = '#8888aa';
  ctx.font = '11px monospace';
  ctx.textAlign = 'center';
  for (let c = start; c <= S.viewMax; c += tick) {
    const x = c2x(c);
    if (x < -20 || x > W + 20) continue;
    ctx.strokeStyle = '#667';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(x, Y - barH/2 - 6); ctx.lineTo(x, Y + barH/2 + 6); ctx.stroke();
    ctx.fillText(vr > 30 ? Math.round(c) + '¢' : c.toFixed(1) + '¢', x, Y - barH/2 - 10);
  }

  const sub = tick / 5;
  if (sub > 0.005) {
    const ss = Math.ceil(S.viewMin / sub) * sub;
    for (let c = ss; c <= S.viewMax; c += sub) {
      const x = c2x(c);
      if (x < 0 || x > W) continue;
      ctx.strokeStyle = '#4a4a6a';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(x, Y - barH/2 - 2); ctx.lineTo(x, Y + barH/2 + 2); ctx.stroke();
    }
  }
}

// ================================================================
//  RENDER — MOS Regions (colored bands)
// ================================================================

function drawMOS(ctx, W, H, vr) {
  const tempSpace = S.selected && S._tempRows ? S._tempRows * 16 + 8 : 0;
  const startY = S.selected ? 120 + tempSpace : 64;
  const rowH = 20;
  const gap = 2;

  const allSizes = [];
  for (let n = S.minSize; n <= S.maxSize; n++) allSizes.push(n);
  const sizeToRow = {};
  allSizes.forEach((n, i) => { sizeToRow[n] = i; });

  const visible = S.regions
    .filter(r => r.highCents > S.viewMin && r.lowCents < S.viewMax && r.size >= S.minSize);

  for (const r of visible) {
    const ri = sizeToRow[r.size];
    if (ri === undefined) continue;
    const y = startY + ri * (rowH + gap);
    if (y + rowH > H) continue;

    const x1 = Math.max(0, c2x(r.lowCents));
    const x2 = Math.min(W, c2x(r.highCents));
    const w = x2 - x1;
    if (w < 1) continue;

    const isSel = S.selected && S.selected.key === r.key &&
      Math.abs(S.selected.lowCents - r.lowCents) < 0.01 &&
      Math.abs(S.selected.highCents - r.highCents) < 0.01;
    const isHov = !S.selected && S.hovered === r;
    const grayed = S.selected && !isSel;

    let alpha = 0.5;
    if (isSel) alpha = 0.85;
    else if (grayed) alpha = 0.12;
    else if (isHov) alpha = 0.7;

    let baseColor = r.color;
    if (isSel && S.generatorCents !== null && r.collapsedColor && r.equalizedColor) {
      const eqEnd = getEqualizedEnd(r);
      const genT = eqEnd === 'low'
        ? (S.generatorCents - r.lowCents) / (r.highCents - r.lowCents)
        : (r.highCents - S.generatorCents) / (r.highCents - r.lowCents);
      const soft = Math.max(0, Math.min(1, 1 - genT));
      baseColor = lerpColor(r.collapsedColor, r.equalizedColor, soft);
    }
    const drawColor = grayed ? '#555555' : baseColor;
    ctx.fillStyle = hexA(drawColor, alpha);
    ctx.fillRect(x1, y, w, rowH);

    const active = isSel || (isHov && !grayed);
    ctx.strokeStyle = active ? '#fff' : hexA(drawColor, grayed ? 0.2 : 0.7);
    ctx.lineWidth = active ? 2 : 1;
    ctx.strokeRect(x1 + 0.5, y + 0.5, w - 1, rowH - 1);

    if (w > 24 && (!grayed || w > 50)) {
      const label = r.key.replace('_', ' ');
      const fname = MOS_NAMES[r.key];
      ctx.fillStyle = grayed ? '#444' : '#fff';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      if (w > 110 && fname && !grayed) {
        ctx.font = 'bold 11px monospace';
        ctx.fillText(`${label} (${fname})`, x1 + w/2, y + rowH/2 - 4);
        ctx.font = '8px monospace';
        ctx.fillStyle = '#bbb';
        ctx.fillText(`${r.lowCents.toFixed(1)}¢–${r.highCents.toFixed(1)}¢`, x1 + w/2, y + rowH/2 + 7);
      } else if (w > 50) {
        ctx.font = grayed ? '9px monospace' : 'bold 10px monospace';
        ctx.fillText(label, x1 + w/2, y + rowH/2);
      } else {
        ctx.font = '8px monospace';
        ctx.fillText(label, x1 + w/2, y + rowH/2);
      }
    }

    r._y = y;
    r._h = rowH;
  }

  ctx.fillStyle = '#556';
  ctx.font = '9px monospace';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  for (const n of allSizes) {
    const y = startY + sizeToRow[n] * (rowH + gap);
    if (y > H - 80) break;
    ctx.fillText(n + '', 16, y + rowH / 2);
  }

  return startY + allSizes.length * (rowH + gap) + 8;
}

// ================================================================
//  RENDER — EDOs
// ================================================================

function drawEDOs(ctx, W, H, vr) {
  if (!S.selected) return;

  const baseY = 56;
  const sel = S.selected;

  const vis = S.edos.filter(g =>
    g.cents >= S.viewMin && g.cents <= S.viewMax &&
    g.cents >= sel.lowCents && g.cents <= sel.highCents
  );
  if (!vis.length) return;

  vis.sort((a, b) => a.edo - b.edo || a.step - b.step);

  const minPx = 48;
  const slots = [];
  const selSize = sel.size;
  S._edoMarkers = [];

  for (const g of vis) {
    const x = c2x(g.cents);
    if (slots.some(s => Math.abs(x - s) < minPx * 0.65)) continue;
    slots.push(x);
    S._edoMarkers.push({ x, cents: g.cents, y: baseY + 22, h: 40 });

    ctx.strokeStyle = '#6eb5ff44';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x, baseY); ctx.lineTo(x, baseY + 22); ctx.stroke();

    ctx.fillStyle = '#6eb5ff';
    ctx.font = 'bold 11px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(`${g.step}\\${g.edo}`, x, baseY + 34);

    ctx.fillStyle = '#556';
    ctx.font = '9px monospace';
    ctx.fillText(g.cents.toFixed(1) + '¢', x, baseY + 45);

    const hr = computeHardness(g.cents, selSize);
    if (hr.ratio !== Infinity && hr.ratio > 0.5) {
      ctx.fillStyle = '#f5a623';
      ctx.font = '9px monospace';
      ctx.fillText(hr.str, x, baseY + 56);
    }
  }
}

// ================================================================
//  RENDER — Temperament bars
// ================================================================

function drawTemperaments(ctx, W, H) {
  const sel = S.selected;
  const selLo = sel.lowCents, selHi = sel.highCents;
  const temps = getTemperamentsForMOS(sel.key, selLo, selHi);
  S._tempRows = 0;
  S._tempBars = [];
  if (!temps.length) return;

  const barH = 14;
  const barGap = 2;
  const baseY = 120;

  const bars = [];
  for (const t of temps) {
    const lo = Math.max(t.effectiveRange[0], selLo);
    const hi = Math.min(t.effectiveRange[1], selHi);
    if (hi <= lo) continue;
    const x1 = Math.max(0, c2x(lo));
    const x2 = Math.min(W, c2x(hi));
    const w = x2 - x1;
    if (w < 1) continue;
    bars.push({ t, x1, x2, w, centsW: t.effectiveRange[1] - t.effectiveRange[0] });
  }
  if (!bars.length) return;

  bars.sort((a, b) => b.centsW - a.centsW || a.t._idx - b.t._idx);

  const rows = [];
  for (const bar of bars) {
    let placed = false;
    for (let r = 0; r < rows.length; r++) {
      if (!rows[r].some(b => b.x1 < bar.x2 && b.x2 > bar.x1)) {
        rows[r].push(bar);
        bar.row = r;
        placed = true;
        break;
      }
    }
    if (!placed) {
      bar.row = rows.length;
      rows.push([bar]);
    }
  }

  S._tempRows = rows.length;

  const maxRow = rows.length - 1;
  S._tempBars = [];
  for (const bar of bars) {
    const y = baseY + (maxRow - bar.row) * (barH + barGap);
    const col = TEMP_COLORS[bar.t.name] || '#888';
    ctx.fillStyle = hexA(col, 0.5);
    ctx.fillRect(bar.x1, y, bar.w, barH);
    ctx.strokeStyle = col;
    ctx.lineWidth = 1;
    ctx.strokeRect(bar.x1, y, bar.w, barH);

    S._tempBars.push({ x1: bar.x1, x2: bar.x2, y, h: barH, url: bar.t.wikiUrl });

    if (bar.w > 35) {
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 9px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const name = bar.t.name;
      if (bar.t.wikiUrl) {
        ctx.fillStyle = '#aaddff';
        ctx.fillText(name, bar.x1 + bar.w / 2, y + barH / 2);
      } else {
        ctx.fillText(name, bar.x1 + bar.w / 2, y + barH / 2);
      }
    }
  }
}

// ================================================================
//  RENDER — Generator marker
// ================================================================

function drawGeneratorMarker(ctx, W, H) {
  const x = c2x(S.generatorCents);
  if (x < 0 || x > W) return;

  ctx.strokeStyle = '#e94560';
  ctx.lineWidth = 2;
  ctx.setLineDash([4, 3]);
  ctx.beginPath();
  ctx.moveTo(x, 40);
  ctx.lineTo(x, H - 10);
  ctx.stroke();
  ctx.setLineDash([]);

  ctx.fillStyle = '#e94560';
  ctx.beginPath();
  ctx.moveTo(x - 5, 40);
  ctx.lineTo(x + 5, 40);
  ctx.lineTo(x, 48);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = '#e94560';
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(S.generatorCents.toFixed(1) + '¢', x, 36);
}

// ================================================================
//  RENDER — MOS Circle
// ================================================================

function getMOSCircleLayout(W, H) {
  const defaultR = Math.min(170, Math.min(W, H) * 0.22);
  const radius = S._circleRadius ? Math.max(60, Math.min(S._circleRadius, Math.min(W, H) * 0.45)) : defaultR;
  const cx = 20 + radius + 10;
  const cy = H - 20 - radius - 10;
  const sliderW = radius * 2 + 16;
  const sliderH = 14;
  const sliderX = cx - sliderW / 2;
  const sliderY = cy - radius - 56;
  return { radius, cx, cy, sliderW, sliderH, sliderX, sliderY };
}

function drawMOSCircle(ctx, W, H) {
  const sel = S.selected;
  const n = sel.size;
  const gen = S.generatorCents;
  const P = 1200;

  const { radius, cx, cy, sliderW, sliderH, sliderX, sliderY } = getMOSCircleLayout(W, H);

  // Background panel
  const panelPad = 28;
  const panelTop = sliderY - 38;
  const panelBot = cy + radius + 36;
  const panelLeft = cx - radius - panelPad;
  const panelRight = cx + radius + panelPad;
  ctx.fillStyle = '#16213ef0';
  ctx.strokeStyle = '#0f3460';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.roundRect(panelLeft, panelTop, panelRight - panelLeft, panelBot - panelTop, 8);
  ctx.fill();
  ctx.stroke();

  // Title line 1: 5L 2s  ratio  UDP  ModeName
  const titleY1 = sliderY - 22;
  const titleText = sel.key.replace('_', ' ');
  ctx.textBaseline = 'middle';
  if (gen !== null) {
    const hr = computeHardness(gen, n);
    const hardStr = hr.ratio === Infinity ? '∞' : hr.ratio.toFixed(2);
    const udp = computeUDP(gen, n, S.modeRotation);
    const modeName = getModeName(sel.key, gen, S.modeRotation);

    ctx.font = 'bold 13px monospace';
    const parts = [
      { text: titleText + '  ', color: '#e94560' },
      { text: hardStr + '  ', color: '#f5a623' },
      { text: udp, color: '#f5a623' },
    ];
    if (modeName) parts.push({ text: '  ' + modeName, color: '#6eb5ff' });

    let totalW = 0;
    for (const p of parts) totalW += ctx.measureText(p.text).width;
    let drawX = cx - totalW / 2;
    ctx.textAlign = 'left';
    for (const p of parts) {
      ctx.fillStyle = p.color;
      ctx.fillText(p.text, drawX, titleY1);
      drawX += ctx.measureText(p.text).width;
    }
  } else {
    ctx.font = 'bold 13px monospace';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#e94560';
    ctx.fillText(titleText, cx, titleY1);
  }

  S._parentArrow = null;
  S._childArrow = null;

  // Mode rotation arrows at top corners of panel
  S._modeButtons = [];
  if (gen !== null) {
    const modeY = panelTop + 12;
    const btnW = 18, btnH = 14, btnGap = 3;

    const drawBtnPair = (x, label, actions) => {
      ctx.font = '9px monospace';
      ctx.textAlign = 'center';
      ctx.fillStyle = '#556';
      ctx.fillText(label, x + btnW + btnGap / 2, modeY - 1);
      for (let i = 0; i < 2; i++) {
        const bx = x + i * (btnW + btnGap);
        ctx.fillStyle = '#1e2a4a';
        ctx.strokeStyle = '#2a3a5a';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.roundRect(bx, modeY, btnW, btnH, 3);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = '#8899bb';
        ctx.font = '10px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(i === 0 ? '◀' : '▶', bx + btnW / 2, modeY + btnH / 2);
        S._modeButtons.push({ x: bx, y: modeY, w: btnW, h: btnH, action: actions[i] });
      }
      ctx.textBaseline = 'alphabetic';
    };

    drawBtnPair(panelLeft + 6, 'gen', ['gen-down', 'gen-up']);
    drawBtnPair(panelRight - 6 - btnW * 2 - btnGap, 'step', ['step-down', 'step-up']);
  }

  // Parent/child navigation arrows below slider
  const parentKey = findParentMOS(sel.nL, sel.nS);
  const childKeys = getChildMOSes(sel.key);
  const arrowY = sliderY + sliderH + 56;
  const arrowR = 11;

  if (parentKey) {
    const ax = sliderX + arrowR;
    ctx.fillStyle = '#f5a623';
    ctx.globalAlpha = 0.7;
    ctx.beginPath();
    ctx.moveTo(ax, arrowY - arrowR);
    ctx.lineTo(ax - arrowR, arrowY + arrowR * 0.4);
    ctx.lineTo(ax + arrowR, arrowY + arrowR * 0.4);
    ctx.closePath();
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.font = '12px monospace';
    ctx.textAlign = 'left';
    ctx.fillStyle = '#f5a623';
    ctx.fillText(parentKey.replace('_', ' '), ax + arrowR + 5, arrowY + 5);
    S._parentArrow = { x: ax, y: arrowY, r: arrowR };
  }

  if (childKeys.length > 0) {
    const ax = sliderX + sliderW - arrowR;
    ctx.fillStyle = '#6eb5ff';
    ctx.globalAlpha = 0.7;
    ctx.beginPath();
    ctx.moveTo(ax, arrowY + arrowR);
    ctx.lineTo(ax - arrowR, arrowY - arrowR * 0.4);
    ctx.lineTo(ax + arrowR, arrowY - arrowR * 0.4);
    ctx.closePath();
    ctx.fill();
    ctx.globalAlpha = 1;
    const childKey = gen !== null
      ? childKeys.find(ck => { const m = ck.match(/(\d+)L_(\d+)s/); if (!m) return false; const sz = +m[1]+ +m[2]; return S.regions.some(r => r.key === ck && r.size === sz && gen >= r.lowCents && gen <= r.highCents); }) || childKeys[0]
      : childKeys[0];
    if (childKey) {
      ctx.font = '12px monospace';
      ctx.textAlign = 'right';
      ctx.fillStyle = '#6eb5ff';
      ctx.fillText(childKey.replace('_', ' '), ax - arrowR - 5, arrowY + 5);
    }
    S._childArrow = { x: ax, y: arrowY, r: arrowR };
  }

  // Hardness slider track
  ctx.fillStyle = '#2a2a4a';
  ctx.beginPath();
  ctx.roundRect(sliderX, sliderY, sliderW, sliderH, sliderH / 2);
  ctx.fill();

  const eqEnd = getEqualizedEnd(sel);
  const eqLabel = eqEnd === 'low' ? 0.15 : 0.85;
  const colLabel = eqEnd === 'low' ? 0.85 : 0.15;
  ctx.fillStyle = '#556';
  ctx.font = '9px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('equalized', sliderX + sliderW * eqLabel, sliderY + sliderH + 12);
  ctx.fillText('collapsed', sliderX + sliderW * colLabel, sliderY + sliderH + 12);

  if (gen !== null) {
    const stepPat = computeStepPattern(gen, n, S.modeRotation);
    const mosLabel = sel.key.replace('_', ' ');
    ctx.font = '11px monospace';
    ctx.textBaseline = 'middle';
    const labelY = sliderY + sliderH + 24;
    ctx.textAlign = 'left';
    ctx.fillStyle = '#e94560';
    ctx.fillText(mosLabel, sliderX, labelY);
    if (stepPat) {
      const mosW = ctx.measureText(mosLabel + '  ').width;
      ctx.fillStyle = '#aab';
      ctx.fillText(stepPat, sliderX + mosW, labelY);
    }
  }

  if (gen !== null) {
    const t = (gen - sel.lowCents) / (sel.highCents - sel.lowCents);
    const thumbX = sliderX + t * sliderW;
    const thumbR = sliderH / 2 + 2;

    const eqT = eqEnd === 'low' ? t : 1 - t;
    const sliderColor = lerpColor(sel.equalizedColor, sel.collapsedColor, Math.max(0, Math.min(1, eqT)));

    const fillW = thumbX - sliderX;
    if (fillW > 1) {
      ctx.fillStyle = hexA(sliderColor, 0.4);
      ctx.beginPath();
      ctx.roundRect(sliderX, sliderY, fillW, sliderH, sliderH / 2);
      ctx.fill();
    }

    ctx.beginPath();
    ctx.arc(thumbX, sliderY + sliderH / 2, thumbR, 0, Math.PI * 2);
    ctx.fillStyle = sliderColor;
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // Outer ring
  ctx.beginPath();
  ctx.arc(cx, cy, radius, 0, Math.PI * 2);
  ctx.strokeStyle = '#3a3a5c';
  ctx.lineWidth = 2.5;
  ctx.stroke();

  if (gen === null) {
    ctx.fillStyle = '#556';
    ctx.font = '13px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('Click cent axis or', cx, cy - 8);
    ctx.fillText('drag slider above', cx, cy + 10);
    return;
  }

  const baseScale = buildMOSScale(gen, n, P);
  const scale = rotateMOSScale(baseScale, S.modeRotation, P);
  const { pitches, steps, L, s } = scale;

  function c2a(cents) {
    return (cents / P) * Math.PI * 2 - Math.PI / 2;
  }

  const ratio = s > 0.01 ? L / s : 20;
  const softness = Math.max(0, Math.min(1, 1 - (ratio - 1) / 2));
  const regionColor = lerpColor(sel.collapsedColor, sel.equalizedColor, softness);

  const Lcolor = regionColor;
  const compColor = complementaryColor(Lcolor);
  const sColor = lerpColor(Lcolor, compColor, 1 - softness);

  // Pie slices
  for (let i = 0; i < n; i++) {
    const startC = pitches[i];
    const step = steps[i];
    const a1 = c2a(startC);
    const a2 = c2a(startC + step);

    const isL = Math.abs(step - L) < 0.5;
    const col = isL ? Lcolor : sColor;

    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, radius, a1, a2);
    ctx.closePath();
    ctx.fillStyle = hexA(col, 0.25);
    ctx.fill();

    ctx.strokeStyle = hexA(col, 0.6);
    ctx.lineWidth = 1;
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(cx, cy, radius, a1, a2);
    ctx.strokeStyle = hexA(col, 0.9);
    ctx.lineWidth = 5;
    ctx.stroke();

    const midAngle = c2a(startC + step / 2);
    const labelR = radius * 0.6;
    const lx = cx + Math.cos(midAngle) * labelR;
    const ly = cy + Math.sin(midAngle) * labelR;

    ctx.fillStyle = col;
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(step.toFixed(0) + '¢', lx, ly);
  }

  // Divider lines + pitch dots + labels
  S._circleDots = [];
  const glowNow = performance.now();
  for (let i = 0; i < n; i++) {
    const angle = c2a(pitches[i]);
    const cos = Math.cos(angle);
    const sin = Math.sin(angle);
    const px = cx + cos * radius;
    const py = cy + sin * radius;
    S._circleDots.push({ x: px, y: py, degree: i, cents: pitches[i] });

    const gs = getGlowState(i, glowNow);
    const glow = gs.intensity;
    const glowColor = gs.color;
    const baseLineColor = i === 0 ? '#e94560' : '#8888aa';
    const baseDotColor = i === 0 ? '#e94560' : '#ffffff';
    const baseLabelColor = i === 0 ? '#e94560' : '#aaaaaa';

    if (glow > 0.003) {
      ctx.save();
      ctx.shadowColor = glowColor;
      ctx.shadowBlur = 28 * glow;
      const [gr, gg, gb] = hexToRGB(glowColor);
      ctx.strokeStyle = `rgba(${gr}, ${gg}, ${gb}, ${glow})`;
      ctx.lineWidth = 1 + 2.5 * glow;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(px, py);
      ctx.stroke();
      ctx.restore();
    }

    const lineColor = glow > 0.003
      ? lerpColor(baseLineColor, glowColor, glow)
      : baseLineColor;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(px, py);
    ctx.strokeStyle = hexA(lineColor, glow > 0.003 ? 0.5 + 0.5 * glow : 0.53);
    ctx.lineWidth = 1;
    ctx.stroke();

    const dotR = 5 + 4 * glow;

    ctx.beginPath();
    ctx.arc(px, py, dotR, 0, Math.PI * 2);
    ctx.fillStyle = lerpColor(baseDotColor, glowColor, glow);
    if (glow > 0.003) {
      ctx.save();
      ctx.shadowColor = glowColor;
      ctx.shadowBlur = 24 * glow;
    }
    ctx.fill();
    if (glow > 0.003) ctx.restore();
    ctx.strokeStyle = '#1a1a2e';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    const outR = radius + 18;
    const ox = cx + cos * outR;
    const oy = cy + sin * outR;

    if (i > 0) {
      ctx.fillStyle = lerpColor(baseLabelColor, glowColor, glow);
      ctx.font = '11px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(pitches[i].toFixed(0), ox, oy);
    }
  }

  // Center info — temperament name only
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const activeTemps = getTemperamentsAtCursor(sel.key, gen, sel.lowCents, sel.highCents);
  if (activeTemps.length) {
    const t = activeTemps[0];
    const col = TEMP_COLORS[t.name] || '#50c878';
    ctx.fillStyle = col;
    ctx.font = 'bold 13px monospace';
    ctx.fillText(t.name, cx, cy - radius * 0.15);
  }

  // JI interval markers — all n/d where n,d < 20, within octave
  const jiMarkers = [];
  const jiSeen = new Set();
  for (let d = 1; d < 20; d++) {
    for (let n = d + 1; n < 20; n++) {
      let gn = n, gd = d, tmp;
      while (gd) { tmp = gd; gd = gn % gd; gn = tmp; }
      const rn = n / gn, rd = d / gn;
      const key = rn + '/' + rd;
      if (jiSeen.has(key)) continue;
      jiSeen.add(key);
      const cents = 1200 * Math.log2(rn / rd);
      if (cents > 0 && cents < 1200 && rn * rd <= 125) {
        jiMarkers.push({ ratio: key, cents, complexity: rn * rd });
      }
    }
  }
  jiMarkers.sort((a, b) => a.complexity - b.complexity);
  for (const ji of jiMarkers) {
    const maxFont = 14, minFont = 6;
    const fontSize = Math.round(maxFont - (maxFont - minFont) * Math.min(1, (ji.complexity - 6) / 119));
    const tickLen = fontSize > 8 ? 13 : 8;
    const angle = c2a(ji.cents);
    const cos = Math.cos(angle);
    const sin = Math.sin(angle);
    ctx.beginPath();
    ctx.moveTo(cx + cos * (radius - tickLen), cy + sin * (radius - tickLen));
    ctx.lineTo(cx + cos * (radius + 3), cy + sin * (radius + 3));
    const alpha = fontSize > 8 ? '99' : '55';
    ctx.strokeStyle = '#f5a623' + alpha;
    ctx.lineWidth = fontSize > 9 ? 1.5 : 1;
    ctx.stroke();
    ctx.fillStyle = '#f5a623';
    ctx.globalAlpha = 0.4 + 0.6 * (fontSize - minFont) / (maxFont - minFont);
    ctx.font = (fontSize > 9 ? 'bold ' : '') + fontSize + 'px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const lr = radius - tickLen - 8;
    ctx.fillText(ji.ratio, cx + cos * lr, cy + sin * lr);
    ctx.globalAlpha = 1;
  }

  // Resize grip at upper-right corner
  const gripX = panelRight - 2;
  const gripY = panelTop + 2;
  const gripSize = 12;
  ctx.strokeStyle = '#8899bb66';
  ctx.lineWidth = 1.5;
  for (let i = 0; i < 3; i++) {
    const off = 3 + i * 3.5;
    ctx.beginPath();
    ctx.moveTo(gripX - off, gripY);
    ctx.lineTo(gripX, gripY + off);
    ctx.stroke();
  }
}

// ================================================================
//  INTERACTION — Hit testing & tooltip
// ================================================================

function hitCircleResizeGrip(mx, my) {
  if (!S.selected) return false;
  const { radius, cx, cy, sliderY } = getMOSCircleLayout(S.W, S.H);
  const panelPad = 28;
  const panelTop = sliderY - 38;
  const panelRight = cx + radius + panelPad;
  const hitSize = 16;
  return mx >= panelRight - hitSize && mx <= panelRight + 4 && my >= panelTop - 4 && my <= panelTop + hitSize;
}

function hitMOSCirclePanel(mx, my) {
  if (!S.selected) return false;
  const { radius, cx, cy, sliderY } = getMOSCircleLayout(S.W, S.H);
  const panelPad = 28;
  const panelTop = sliderY - 38;
  const panelBot = cy + radius + 36;
  const panelLeft = cx - radius - panelPad;
  const panelRight = cx + radius + panelPad;
  return mx >= panelLeft && mx <= panelRight && my >= panelTop && my <= panelBot;
}

function hitModeButton(mx, my) {
  if (!S._modeButtons) return null;
  for (const b of S._modeButtons) {
    if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) return b.action;
  }
  return null;
}

function handleModeButton(action) {
  if (!S.selected || S.generatorCents === null) return;
  const n = S.selected.size;
  if (action === 'step-up') S.modeRotation = (S.modeRotation + 1) % n;
  else if (action === 'step-down') S.modeRotation = (S.modeRotation - 1 + n) % n;
  else if (action === 'gen-up') S.modeRotation = rotateByGenerator(S.generatorCents, n, S.modeRotation, 1);
  else if (action === 'gen-down') S.modeRotation = rotateByGenerator(S.generatorCents, n, S.modeRotation, -1);
  updatePanel();
  render();
}

function hitCircleArrow(mx, my) {
  if (!S.selected) return null;
  const pad = 10;
  if (S._parentArrow) {
    const a = S._parentArrow;
    if (Math.abs(mx - a.x) < a.r + pad && Math.abs(my - a.y) < a.r + pad) return 'parent';
  }
  if (S._childArrow) {
    const a = S._childArrow;
    if (Math.abs(mx - a.x) < a.r + pad && Math.abs(my - a.y) < a.r + pad) return 'child';
  }
  return null;
}

function hitEDOMarker(mx, my) {
  if (!S._edoMarkers) return null;
  for (const m of S._edoMarkers) {
    if (Math.abs(mx - m.x) < 24 && my >= m.y && my <= m.y + m.h) return m;
  }
  return null;
}

function hitCircleDot(mx, my) {
  if (!S._circleDots) return null;
  const hitR = 12;
  for (const dot of S._circleDots) {
    const dx = mx - dot.x, dy = my - dot.y;
    if (dx * dx + dy * dy <= hitR * hitR) return dot;
  }
  return null;
}

function playCircleDot(dot) {
  const latchCode = '_dot_' + dot.degree;
  if (SYNTH.kbdLatch) {
    if (SYNTH._activeKeys[latchCode]) {
      stopKeyNote(latchCode);
    } else {
      startNote(latchCode, dot.degree, SYNTH.octaveShift);
      renderChordHighlights();
    }
    return;
  }
  if (SYNTH._oscCount >= MAX_OSCILLATORS) killAllNotes();
  const actx = getAudioCtx();
  const freq = centsToFreq(dot.cents);
  const now = actx.currentTime;
  const total = SYNTH.attack + SYNTH.decay + SYNTH.release;
  const osc = actx.createOscillator();
  const gain = actx.createGain();
  osc.type = SYNTH.waveform;
  osc.frequency.value = freq;
  osc.connect(gain);
  gain.connect(getMaster());
  gain.gain.setValueAtTime(0, now);
  gain.gain.linearRampToValueAtTime(0.15, now + SYNTH.attack);
  gain.gain.linearRampToValueAtTime(0.15 * SYNTH.sustain, now + SYNTH.attack + SYNTH.decay);
  gain.gain.exponentialRampToValueAtTime(0.001, now + total);
  osc.start(now);
  osc.stop(now + total);
  SYNTH._oscCount++;
  osc.onended = () => {
    SYNTH._oscCount = Math.max(0, SYNTH._oscCount - 1);
    gain.disconnect();
    osc.disconnect();
  };
  const dotGlowId = noteGlowOn(dot.degree, 0);
  setTimeout(() => noteGlowOff(dot.degree, dotGlowId), (SYNTH.attack + SYNTH.decay) * 1000);
}

// Physical key code → logical key character (stable regardless of modifiers)
const CODE_TO_KEY = {};
['z','x','c','v','b','n','m'].forEach((k,i) => CODE_TO_KEY['Key'+k.toUpperCase()] = k);
[',','.','/'].forEach((k,i) => CODE_TO_KEY[['Comma','Period','Slash'][i]] = k);
['a','s','d','f','g','h','j','k','l'].forEach((k,i) => CODE_TO_KEY['Key'+k.toUpperCase()] = k);
CODE_TO_KEY['Semicolon'] = ';';
CODE_TO_KEY['Quote'] = "'";
['q','w','e','r','t','y','u','i','o','p'].forEach((k,i) => CODE_TO_KEY['Key'+k.toUpperCase()] = k);
CODE_TO_KEY['BracketLeft'] = '[';
CODE_TO_KEY['BracketRight'] = ']';
CODE_TO_KEY['Backslash'] = '\\';
['1','2','3','4','5','6','7','8','9','0'].forEach((k,i) => CODE_TO_KEY['Digit'+k] = k);
CODE_TO_KEY['Minus'] = '-';
CODE_TO_KEY['Equal'] = '=';

function codeToKey(code) { return CODE_TO_KEY[code] || null; }

// Keyboard-to-scale mapping
// 1Row mode: each row = 1 octave below/above the home row
// z=1oct below a, x=1oct below s, etc.
const KBD_HOME =  ['a','s','d','f','g','h','j','k','l',';',"'"];
const KBD_BOTTOM = ['z','x','c','v','b','n','m',',','.','/'];
const KBD_UPPER =  ['q','w','e','r','t','y','u','i','o','p','[',']','\\'];
const KBD_TOP =    ['1','2','3','4','5','6','7','8','9','0','-','='];

// Continuous mode: / is 1 step below A, . is 2 below, etc.
// Then A ascends normally through home, upper, top rows
const KBD_BELOW = ['/','.',',','m','n','b','v','c','x','z']; // index 0 = 1 below, index 9 = 10 below
const KBD_ABOVE = [
  'a','s','d','f','g','h','j','k','l',';',"'",
  'q','w','e','r','t','y','u','i','o','p','[',']','\\',
  '1','2','3','4','5','6','7','8','9','0','-','=',
];

function getKeyMapping(key) {
  const k = key.toLowerCase();
  if (SYNTH.kbdContinuous) {
    const aboveIdx = KBD_ABOVE.indexOf(k);
    if (aboveIdx !== -1) {
      return { degree: aboveIdx, octave: 0 };
    }
    const belowIdx = KBD_BELOW.indexOf(k);
    if (belowIdx !== -1) {
      // / = 1 below, . = 2 below, etc. → offset = -(belowIdx+1)
      const offset = -(belowIdx + 1);
      if (!S.selected) return { degree: 0, octave: -1 };
      const n = S.selected.size;
      const octave = Math.floor(offset / n);
      const degreeInOctave = ((offset % n) + n) % n;
      return { degree: degreeInOctave, octave: octave };
    }
    return null;
  }
  // 1Row mode
  let idx = KBD_HOME.indexOf(k);
  if (idx !== -1) return { degree: idx, octave: 0 };
  idx = KBD_BOTTOM.indexOf(k);
  if (idx !== -1) return { degree: idx, octave: -1 };
  idx = KBD_UPPER.indexOf(k);
  if (idx !== -1) return { degree: idx, octave: 1 };
  idx = KBD_TOP.indexOf(k);
  if (idx !== -1) return { degree: idx, octave: 2 };
  return null;
}


function killAllNotes() {
  const actx = SYNTH.ctx;
  const now = actx ? actx.currentTime : 0;
  for (const code of Object.keys(SYNTH._activeKeys)) {
    const entry = SYNTH._activeKeys[code];
    try {
      if (actx) {
        entry.gain.gain.cancelScheduledValues(now);
        entry.gain.gain.setValueAtTime(0, now);
      }
      entry.osc.stop(now + 0.01);
    } catch {}
    try { entry.gain.disconnect(); } catch {}
    try { entry.osc.disconnect(); } catch {}
    if (entry.degreeInScale !== undefined) {
      noteGlowOff(entry.degreeInScale, entry.glowId);
    }
  }
  SYNTH._activeKeys = {};
  SYNTH._oscCount = 0;
  _chordActiveCodes = [];
}

function startNote(code, degreeInScale, noteOctave, startAt) {
  if (!S.selected || S.generatorCents === null) return;

  if (SYNTH._oscCount >= MAX_OSCILLATORS) {
    killAllNotes();
  }

  const n = S.selected.size;
  const scale = rotateMOSScale(buildMOSScale(S.generatorCents, n, 1200), S.modeRotation, 1200);
  const cents = scale.pitches[degreeInScale];
  const totalCents = cents + noteOctave * 1200;
  const freq = SYNTH.baseFreq * Math.pow(2, totalCents / 1200);

  const actx = getAudioCtx();
  const osc = actx.createOscillator();
  const gain = actx.createGain();
  osc.type = SYNTH.waveform;
  osc.frequency.value = freq;
  osc.connect(gain);
  gain.connect(getMaster());
  const t = startAt || actx.currentTime;
  const attack = Math.max(SYNTH.attack, 0.02);
  gain.gain.setValueAtTime(0, t);
  gain.gain.linearRampToValueAtTime(0.15, t + attack);
  gain.gain.linearRampToValueAtTime(0.15 * SYNTH.sustain, t + attack + SYNTH.decay);
  osc.start(t);
  SYNTH._oscCount++;
  osc.onended = () => {
    SYNTH._oscCount = Math.max(0, SYNTH._oscCount - 1);
    try { gain.disconnect(); } catch {}
    try { osc.disconnect(); } catch {}
  };
  let glowId = null;
  if (degreeInScale < n) {
    glowId = noteGlowOn(degreeInScale, noteOctave);
  }
  SYNTH._activeKeys[code] = { osc, gain, degreeInScale, glowId, noteOctave, currentCents: totalCents };
}

function playKeyNote(key, code) {
  if (!S.selected || S.generatorCents === null) return;
  const mapping = getKeyMapping(key);
  if (!mapping) return;
  const n = S.selected.size;
  const octaveWrap = Math.floor(mapping.degree / n);
  const degreeInScale = ((mapping.degree % n) + n) % n;
  const noteOctave = mapping.octave + octaveWrap + SYNTH.octaveShift;
  startNote(code, degreeInScale, noteOctave);
  renderChordHighlights();
}

function findNearestDegrees(targetCents, scale, n) {
  const candidates = [];
  for (let d = 0; d < n; d++) {
    const baseCents = scale.pitches[d];
    const octEst = Math.round((targetCents - baseCents) / 1200);
    for (let o = octEst - 1; o <= octEst + 1; o++) {
      const c = baseCents + o * 1200;
      candidates.push({ deg: d, oct: o, cents: c, dist: Math.abs(c - targetCents) });
    }
  }
  candidates.sort((a, b) => a.dist - b.dist);
  return candidates;
}

function updateHeldNotes() {
  if (!S.selected || S.generatorCents === null) return;
  const n = S.selected.size;
  const scale = rotateMOSScale(buildMOSScale(S.generatorCents, n, 1200), S.modeRotation, 1200);
  const actx = SYNTH.ctx;
  if (!actx) return;
  const now = actx.currentTime;
  const keys = Object.keys(SYNTH._activeKeys);
  if (!keys.length) return;

  const entries = keys.map(k => {
    const entry = SYNTH._activeKeys[k];
    if (entry.currentCents === undefined) {
      entry.currentCents = scale.pitches[entry.degreeInScale % n] + entry.noteOctave * 1200;
    }
    return { key: k, entry, candidates: findNearestDegrees(entry.currentCents, scale, n) };
  });
  entries.sort((a, b) => a.candidates[0].dist - b.candidates[0].dist);

  const taken = new Set();
  for (const e of entries) {
    for (const c of e.candidates) {
      const slot = c.deg + '|' + c.oct;
      if (!taken.has(slot)) {
        taken.add(slot);
        e.chosen = c;
        break;
      }
    }
    if (!e.chosen) e.chosen = e.candidates[0];
  }

  for (const e of entries) {
    const entry = e.entry;
    const oldDeg = entry.degreeInScale;
    const bestDeg = e.chosen.deg;
    const bestOct = e.chosen.oct;

    if (bestDeg !== oldDeg && entry.glowId != null) {
      const oldArr = SYNTH._glows[oldDeg];
      if (oldArr) {
        const idx = oldArr.findIndex(g => g.id === entry.glowId);
        if (idx !== -1) {
          const glowEntry = oldArr.splice(idx, 1)[0];
          if (!oldArr.length) delete SYNTH._glows[oldDeg];
          if (!SYNTH._glows[bestDeg]) SYNTH._glows[bestDeg] = [];
          SYNTH._glows[bestDeg].push(glowEntry);
        }
      }
    }
    entry.degreeInScale = bestDeg;
    entry.noteOctave = bestOct;
    const newCents = scale.pitches[bestDeg] + bestOct * 1200;
    entry.currentCents = newCents;
    const freq = SYNTH.baseFreq * Math.pow(2, newCents / 1200);
    entry.osc.frequency.setValueAtTime(freq, now);
  }
}

function stopKeyNote(code) {
  const entry = SYNTH._activeKeys[code];
  if (!entry) return;
  const actx = getAudioCtx();
  const now = actx.currentTime;
  const rel = Math.min(SYNTH.release, 2);
  const currentGain = entry.gain.gain.value;
  const releaseFrom = Math.max(currentGain, 0.001);
  entry.gain.gain.cancelScheduledValues(now);
  entry.gain.gain.setValueAtTime(releaseFrom, now);
  entry.gain.gain.exponentialRampToValueAtTime(0.001, now + rel);
  entry.osc.stop(now + rel + 0.05);
  if (entry.degreeInScale !== undefined) {
    noteGlowOff(entry.degreeInScale, entry.glowId);
  }
  delete SYNTH._activeKeys[code];
  renderChordHighlights();
}

function hitTest(mx, my, e) {
  const tip = document.getElementById('tooltip');
  let found = null;

  if (hitMOSCirclePanel(mx, my)) {
    if (S.hovered) {
      S.hovered = null;
      tip.style.display = 'none';
      S.canvas.style.cursor = '';
      render();
    }
    return;
  }

  for (const r of S.regions) {
    if (r._y === undefined) continue;
    const x1 = c2x(r.lowCents), x2 = c2x(r.highCents);
    if (mx >= x1 && mx <= x2 && my >= r._y && my <= r._y + r._h) {
      if (!found || r.size > found.size) found = r;
    }
  }

  if (found !== S.hovered) {
    S.hovered = found;
    render();
  }

  if (found) {
    const cc = x2c(mx);
    const hr = computeHardness(cc, found.size);
    const label = found.key.replace('_', ' ');
    const fname = MOS_NAMES[found.key];

    let html = `<div class="tt-title">${label}${fname ? ' — ' + fname : ''}</div>`;
    html += `<div class="tt-sub">${found.lowCents.toFixed(2)}¢ — ${found.highCents.toFixed(2)}¢ &middot; ${found.size} notes</div>`;

    if (found.parent) {
      const pn = MOS_NAMES[found.parent];
      html += `<div class="tt-sub">Parent: ${found.parent.replace('_',' ')}${pn ? ' ('+pn+')' : ''}</div>`;
    }

    if (hr.ratio !== Infinity) {
      html += `<div class="tt-hard">L:s = ${hr.str} &nbsp; (L=${hr.L.toFixed(1)}¢, s=${hr.s.toFixed(1)}¢)</div>`;
    }

    const temps = getTemperamentsAtCursor(found.key, cc, found.lowCents, found.highCents);
    for (const t of temps) {
      const col = TEMP_COLORS[t.name] || '#50c878';
      html += `<div class="tt-temp"><span style="color:${col};font-weight:700">${t.name}</span> — ${t.description}</div>`;
      if (t.commas && t.commas.length) {
        html += `<div class="tt-temp" style="color:#999;font-size:10px">Commas: ${t.commas.map((c, i) => `<span style="color:#f5a623">${c}</span>${t.commaNames[i] ? ' ('+t.commaNames[i]+')' : ''}`).join(', ')}</div>`;
      }
    }

    let nearest = null, nd = Infinity;
    for (const g of S.edos) {
      const d = Math.abs(g.cents - cc);
      if (d < nd && g.cents >= found.lowCents && g.cents <= found.highCents) {
        nd = d; nearest = g;
      }
    }
    if (nearest && nd < (S.viewMax - S.viewMin) * 0.02) {
      html += `<div class="tt-edo">Nearest: ${nearest.step}\\${nearest.edo} = ${nearest.cents.toFixed(2)}¢</div>`;
    }

    const isSelRegion = S.selected &&
      S.selected.key === found.key &&
      Math.abs(S.selected.lowCents - found.lowCents) < 0.01 &&
      Math.abs(S.selected.highCents - found.highCents) < 0.01;
    html += `<div style="color:#444;font-size:10px;margin-top:3px">${isSelRegion ? 'Click/drag to set generator' : 'Click to select'}</div>`;
    tip.innerHTML = html;
    tip.style.display = 'block';

    let tx = e.clientX + 15, ty = e.clientY + 15;
    if (tx + 330 > window.innerWidth) tx = e.clientX - 340;
    if (ty + 200 > window.innerHeight) ty = e.clientY - 210;
    tip.style.left = tx + 'px';
    tip.style.top = ty + 'px';

    S.canvas.style.cursor = 'pointer';
  } else {
    tip.style.display = 'none';
    S.canvas.style.cursor = '';
  }
}

function hitTempBar(mx, my) {
  for (const bar of S._tempBars) {
    if (mx >= bar.x1 && mx <= bar.x2 && my >= bar.y && my <= bar.y + bar.h && bar.url) {
      return bar;
    }
  }
  return null;
}

function handleClick() {
  const mx = S._lastClickX !== undefined ? S._lastClickX : 0;
  const my = S._lastClickY !== undefined ? S._lastClickY : 0;

  const tempBar = hitTempBar(mx, my);
  if (tempBar) {
    window.open(tempBar.url, '_blank');
    return;
  }

  const edoMarker = hitEDOMarker(mx, my);
  if (edoMarker && S.selected) {
    S.generatorCents = edoMarker.cents;
    updatePanel();
    render();
    return;
  }

  if (S.hovered) {
    const clickedSameRegion = S.selected &&
      S.selected.key === S.hovered.key &&
      Math.abs(S.selected.lowCents - S.hovered.lowCents) < 0.01 &&
      Math.abs(S.selected.highCents - S.hovered.highCents) < 0.01;

    if (clickedSameRegion) {
      const cc = x2c(mx);
      S.generatorCents = Math.max(S.selected.lowCents, Math.min(S.selected.highCents, cc));
      updatePanel();
      render();
    } else {
      const prevGen = S.generatorCents;
      S.selected = S.hovered;
      if (prevGen !== null &&
          prevGen >= S.hovered.lowCents && prevGen <= S.hovered.highCents) {
        S.generatorCents = prevGen;
      } else {
        S.generatorCents = null;
      }
      updatePanel();
      render();
    }
  } else if (S.selected) {
    if (hitMOSCirclePanel(mx, my)) return;
    const cc = x2c(mx);
    if (cc >= S.selected.lowCents && cc <= S.selected.highCents) {
      S.generatorCents = cc;
      updatePanel();
      render();
    } else {
      S.selected = null;
      S.generatorCents = null;
      updatePanel();
      render();
    }
  }
}

// ================================================================
//  INTERACTION — Navigation
// ================================================================

function ensureSizeVisible(size) {
  let changed = false;
  if (size < S.minSize) {
    S.minSize = size;
    document.getElementById('min-size').value = S.minSize;
    document.getElementById('min-size-val').textContent = S.minSize;
    changed = true;
  }
  if (size > S.maxSize) {
    S.maxSize = size;
    document.getElementById('max-mos-size').value = S.maxSize;
    document.getElementById('max-mos-val').textContent = S.maxSize;
    changed = true;
  }
  if (changed) recalc();
}

function navigateToParent() {
  const sel = S.selected;
  const parentKey = findParentMOS(sel.nL, sel.nS);
  if (!parentKey) return;

  const gen = S.generatorCents;
  const m = parentKey.match(/(\d+)L_(\d+)s/);
  if (m) ensureSizeVisible(+m[1] + +m[2]);

  const candidate = S.regions.find(r =>
    r.key === parentKey &&
    r.size >= S.minSize && r.size <= S.maxSize &&
    (gen === null || (gen >= r.lowCents && gen <= r.highCents)) &&
    r.lowCents < sel.highCents && r.highCents > sel.lowCents
  );
  if (!candidate) return;

  S.selected = candidate;
  if (gen !== null && (gen < candidate.lowCents || gen > candidate.highCents)) {
    S.generatorCents = null;
  }
  updatePanel();
  render();
}

function navigateToChild() {
  const sel = S.selected;
  const childKeys = getChildMOSes(sel.key);
  const gen = S.generatorCents;

  for (const ck of childKeys) {
    const m = ck.match(/(\d+)L_(\d+)s/);
    if (m) ensureSizeVisible(+m[1] + +m[2]);
  }

  let candidate = null;
  for (const ck of childKeys) {
    const match = S.regions.find(r =>
      r.key === ck &&
      r.size >= S.minSize && r.size <= S.maxSize &&
      (gen !== null
        ? (gen >= r.lowCents && gen <= r.highCents)
        : (r.lowCents < sel.highCents && r.highCents > sel.lowCents))
    );
    if (match) { candidate = match; break; }
  }
  if (!candidate) return;

  S.selected = candidate;
  if (gen !== null && (gen < candidate.lowCents || gen > candidate.highCents)) {
    S.generatorCents = null;
  }
  updatePanel();
  render();
}

function navigateToChildByKey(childKey) {
  const sel = S.selected;
  const gen = S.generatorCents;

  const m = childKey.match(/(\d+)L_(\d+)s/);
  if (m) ensureSizeVisible(+m[1] + +m[2]);

  const candidate = S.regions.find(r =>
    r.key === childKey &&
    r.size >= S.minSize && r.size <= S.maxSize &&
    (gen !== null
      ? (gen >= r.lowCents && gen <= r.highCents)
      : (r.lowCents < sel.highCents && r.highCents > sel.lowCents))
  );
  if (!candidate) return;

  S.selected = candidate;
  if (gen !== null && (gen < candidate.lowCents || gen > candidate.highCents)) {
    S.generatorCents = null;
  }
  updatePanel();
  render();
}

function findAdjacentRegion(sel, cents) {
  const candidates = S.regions.filter(r =>
    r.size >= S.minSize && r.size <= S.maxSize &&
    cents >= r.lowCents - 0.5 && cents <= r.highCents + 0.5 &&
    !(r.key === sel.key &&
      Math.abs(r.lowCents - sel.lowCents) < 0.01 &&
      Math.abs(r.highCents - sel.highCents) < 0.01)
  );
  if (!candidates.length) return null;

  candidates.sort((a, b) => {
    const da = Math.abs(a.size - sel.size);
    const db = Math.abs(b.size - sel.size);
    if (da !== db) return da - db;
    const ma = (a.lowCents + a.highCents) / 2;
    const mb = (b.lowCents + b.highCents) / 2;
    return Math.abs(ma - cents) - Math.abs(mb - cents);
  });
  return candidates[0];
}

//  INTERACTION — Slider & axis
// ================================================================

function isOnAxisBar(my) {
  return my <= 55;
}

function hitSlider(mx, my) {
  if (!S.selected) return false;
  const lay = getMOSCircleLayout(S.W, S.H);
  const pad = 6;
  return mx >= lay.sliderX - pad && mx <= lay.sliderX + lay.sliderW + pad &&
         my >= lay.sliderY - pad && my <= lay.sliderY + lay.sliderH + pad;
}

function sliderXToGen(mx) {
  const sel = S.selected;
  const lay = getMOSCircleLayout(S.W, S.H);
  const t = Math.max(0, Math.min(1, (mx - lay.sliderX) / lay.sliderW));
  return sel.lowCents + t * (sel.highCents - sel.lowCents);
}

function setGenFromScreenX(mx) {
  const cc = x2c(mx);
  const sel = S.selected;

  if (cc < sel.lowCents || cc > sel.highCents) {
    const clamped = Math.max(0, Math.min(1200, cc));
    const adj = findAdjacentRegion(sel, clamped);
    if (adj) {
      S.selected = adj;
      S.generatorCents = Math.max(adj.lowCents, Math.min(adj.highCents, clamped));
      updatePanel();
      render();
      return;
    }
  }

  S.generatorCents = Math.max(sel.lowCents, Math.min(sel.highCents, cc));
  updatePanel();
  render();
}

function clampView() {
  const range = S.viewMax - S.viewMin;
  if (S.viewMin < 0) { S.viewMin = 0; S.viewMax = range; }
  if (S.viewMax > 1200) { S.viewMax = 1200; S.viewMin = 1200 - range; }
  S.viewMin = Math.max(0, S.viewMin);
  S.viewMax = Math.min(1200, S.viewMax);
}

function updateInfo() {
  document.getElementById('range-display').textContent =
    `${S.viewMin.toFixed(2)}¢ — ${S.viewMax.toFixed(2)}¢`;
}

// ================================================================
//  AUDIO — Synth & arpeggiation
// ================================================================

const SYNTH_DEFAULTS = {
  waveform: 'triangle', octaveShift: 0, volume: 1.0,
  attack: 0.015, decay: 0.1, sustain: 1.0, release: 4,
  keyboardMode: true, kbdContinuous: false, kbdLatch: false,
};
const SYNTH_KEYS = Object.keys(SYNTH_DEFAULTS);

function saveSynthSettings() {
  const obj = {};
  for (const k of SYNTH_KEYS) obj[k] = SYNTH[k];
  try { localStorage.setItem('mos-synth', JSON.stringify(obj)); } catch {}
}

function loadSynthSettings() {
  try {
    const s = JSON.parse(localStorage.getItem('mos-synth'));
    if (s) for (const k of SYNTH_KEYS) if (k in s) SYNTH[k] = s[k];
  } catch {}
}

const MAX_OSCILLATORS = 32;

const SYNTH = {
  ctx: null,
  waveform: 'triangle',
  baseFreq: 261.63, // C4
  keyboardMode: true,
  kbdContinuous: false,
  kbdLatch: false,
  octaveShift: 0,
  volume: 1.0,
  attack: 0.015,
  decay: 0.1,
  sustain: 1.0,
  release: 1.5,
  _activeKeys: {},
  _glows: {},
  _glowAnimating: false,
  _oscCount: 0,
};

const OCTAVE_GLOW_COLORS = {
  '-1': '#bb86fc',
  '0': '#4cc9f0',
  '1': '#50c878',
  '2': '#f5c842',
};

function glowColorForOctave(oct) {
  if (oct <= -1) return OCTAVE_GLOW_COLORS['-1'];
  if (oct >= 2) return OCTAVE_GLOW_COLORS['2'];
  return OCTAVE_GLOW_COLORS[String(oct)] || OCTAVE_GLOW_COLORS['0'];
}

let _glowIdCounter = 0;

function noteGlowOn(degree, octave) {
  const id = ++_glowIdCounter;
  const color = glowColorForOctave(octave || 0);
  if (!SYNTH._glows[degree]) SYNTH._glows[degree] = [];
  SYNTH._glows[degree].push({ id, start: performance.now(), held: true, releaseStart: null, color });
  startGlowAnimation();
  return id;
}

function noteGlowOff(degree, glowId) {
  const arr = SYNTH._glows[degree];
  if (!arr) return;
  if (glowId !== undefined) {
    const g = arr.find(e => e.id === glowId);
    if (g && g.held) {
      g.held = false;
      g.releaseStart = performance.now();
      g.releaseLevel = g._lastEnv || SYNTH.sustain;
    }
  } else {
    for (const g of arr) {
      if (g.held) {
        g.held = false;
        g.releaseStart = performance.now();
        g.releaseLevel = g._lastEnv || SYNTH.sustain;
      }
    }
  }
}

function _envForGlow(g, now) {
  const elapsed = (now - g.start) / 1000;
  const atkEnd = SYNTH.attack;
  const decEnd = atkEnd + SYNTH.decay;

  let env;
  if (elapsed < atkEnd) {
    env = elapsed / Math.max(0.001, atkEnd);
  } else if (elapsed < decEnd) {
    env = 1 - (1 - SYNTH.sustain) * ((elapsed - atkEnd) / Math.max(0.001, SYNTH.decay));
  } else {
    env = SYNTH.sustain;
  }

  if (!g.held && g.releaseStart !== null) {
    const relElapsed = (now - g.releaseStart) / 1000;
    const t = relElapsed / Math.max(0.01, SYNTH.release);
    if (t >= 1) return -1;
    const audioGain = Math.pow(0.001, t);
    env = g.releaseLevel * Math.pow(audioGain, 0.3);
  }

  g._lastEnv = env;
  return env < 0.005 ? -1 : env;
}

function getGlowState(degree, now) {
  const arr = SYNTH._glows[degree];
  if (!arr || !arr.length) return { intensity: 0, color: '#4cc9f0' };

  let bestIntensity = 0;
  let bestColor = '#4cc9f0';
  for (let i = arr.length - 1; i >= 0; i--) {
    const env = _envForGlow(arr[i], now);
    if (env < 0) {
      arr.splice(i, 1);
      continue;
    }
    if (env > bestIntensity) {
      bestIntensity = env;
      bestColor = arr[i].color;
    }
  }
  if (!arr.length) delete SYNTH._glows[degree];
  return { intensity: bestIntensity, color: bestColor };
}

function startGlowAnimation() {
  if (SYNTH._glowAnimating) return;
  SYNTH._glowAnimating = true;
  function tick() {
    if (Object.keys(SYNTH._glows).length === 0) {
      SYNTH._glowAnimating = false;
      render();
      return;
    }
    render();
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

function getAudioCtx() {
  if (!SYNTH.ctx) {
    SYNTH.ctx = new (window.AudioContext || window.webkitAudioContext)();
    const comp = SYNTH.ctx.createDynamicsCompressor();
    comp.threshold.value = -24;
    comp.knee.value = 12;
    comp.ratio.value = 12;
    comp.attack.value = 0.003;
    comp.release.value = 0.1;
    const vol = SYNTH.ctx.createGain();
    vol.gain.value = SYNTH.volume;
    comp.connect(vol);
    vol.connect(SYNTH.ctx.destination);
    SYNTH._volumeNode = vol;
    SYNTH._master = comp;
  }
  if (SYNTH.ctx.state === 'suspended') SYNTH.ctx.resume();
  return SYNTH.ctx;
}

function getMaster() {

// ================================================================
//  CHORDS — find JI-approximate chords in the current scale
// ================================================================

const JI_POOL = [];
(function buildJIPool() {
  const seen = new Set();
  for (let d = 1; d <= 16; d++) {
    for (let n = d + 1; n <= 16; n++) {
      const g = gcd(n, d);
      const rn = n / g, rd = d / g;
      const key = rn + '/' + rd;
      if (seen.has(key)) continue;
      seen.add(key);
      const cents = 1200 * Math.log2(rn / rd);
      if (cents > 0 && cents < 1200) {
        JI_POOL.push({ n: rn, d: rd, cents, complexity: rn * rd });
      }
    }
  }
  JI_POOL.sort((a, b) => a.cents - b.cents);
})();

// Binary search: find index of first JI_POOL entry with cents >= target
function jiPoolLowerBound(target) {
  let lo = 0, hi = JI_POOL.length;
  while (lo < hi) {
    const mid = (lo + hi) >> 1;
    if (JI_POOL[mid].cents < target) lo = mid + 1; else hi = mid;
  }
  return lo;
}

function _intNotation3(n1, d1, n2, d2) {
  let L = d1;
  const g1 = gcd(L, d2);
  L = (L / g1) * d2;
  const a = L, b = n1 * (L / d1), c = n2 * (L / d2);
  const g2 = gcd(a, gcd(b, c));
  return [a / g2, b / g2, c / g2];
}


function _canonKey3(a, b, c) {
  let bestA = a, bestB = b, bestC = c;
  let r1a = b, r1b = c, r1c = a;
  while (r1c <= r1b) r1c *= 2;
  let g = gcd(r1a, gcd(r1b, r1c));
  let na = r1a/g, nb = r1b/g, nc = r1c/g;
  if (na < bestA || (na === bestA && (nb < bestB || (nb === bestB && nc < bestC)))) {
    bestA = na; bestB = nb; bestC = nc;
  }
  r1a = c; r1b = a; r1c = b;
  while (r1b <= r1a) r1b *= 2;
  while (r1c <= r1b) r1c *= 2;
  g = gcd(r1a, gcd(r1b, r1c));
  na = r1a/g; nb = r1b/g; nc = r1c/g;
  if (na < bestA || (na === bestA && (nb < bestB || (nb === bestB && nc < bestC)))) {
    bestA = na; bestB = nb; bestC = nc;
  }
  return bestA + ':' + bestB + ':' + bestC;
}


function findScaleChords(scalePitches, maxErr, maxCx) {
  if (!scalePitches || scalePitches.length < 3) return [];
  const n = scalePitches.length;
  const poolLen = JI_POOL.length;
  const triadMap = {};

  for (let root = 0; root < n; root++) {
    const approxByDeg = new Array(n);
    const activeDegKeys = [];
    for (let deg = 1; deg < n; deg++) {
      const targetDeg = (root + deg) % n;
      let cents = scalePitches[targetDeg] - scalePitches[root];
      if (cents <= 0) cents += 1200;
      const lo = jiPoolLowerBound(cents - maxErr);
      let list = null;
      for (let ji_i = lo; ji_i < poolLen; ji_i++) {
        const ji = JI_POOL[ji_i];
        if (ji.cents > cents + maxErr) break;
        if (ji.complexity > maxCx) continue;
        if (!list) { list = []; approxByDeg[deg] = list; activeDegKeys.push(deg); }
        list.push(targetDeg, deg, cents, ji.n, ji.d, ji.cents, cents - ji.cents);
      }
    }
    const dkLen = activeDegKeys.length;

    for (let di = 0; di < dkLen; di++) {
      const list1 = approxByDeg[activeDegKeys[di]];
      const l1Len = list1.length;
      for (let dj = di + 1; dj < dkLen; dj++) {
        const list2 = approxByDeg[activeDegKeys[dj]];
        const l2Len = list2.length;
        for (let i1 = 0; i1 < l1Len; i1 += 7) {
          const c1 = list1[i1 + 2], n1 = list1[i1 + 3], d1 = list1[i1 + 4], se1 = list1[i1 + 6];
          const deg1 = list1[i1];
          for (let i2 = 0; i2 < l2Len; i2 += 7) {
            const c2 = list2[i2 + 2];
            if (c2 - c1 < 50) continue;
            const n2 = list2[i2 + 3], d2 = list2[i2 + 4], se2 = list2[i2 + 6];
            const deg2 = list2[i2];
            const nums = _intNotation3(n1, d1, n2, d2);
            const intKey = nums[0] + ':' + nums[1] + ':' + nums[2];
            const canonKey = _canonKey3(nums[0], nums[1], nums[2]);
            let group = triadMap[canonKey];
            if (!group) {
              group = { canonKey, inversions: {}, type: 3 };
              triadMap[canonKey] = group;
            }
            let inv = group.inversions[intKey];
            if (!inv) {
              const mean = (se1 + se2) / 3;
              const rms = Math.sqrt((mean * mean + (se1 - mean) * (se1 - mean) + (se2 - mean) * (se2 - mean)) / 3);
              inv = { notation: intKey, type: 3, roots: [], rmsError: rms, maxNum: Math.max(nums[0], nums[1], nums[2]) };
              group.inversions[intKey] = inv;
            }
            inv.roots.push({ root, degrees: [root, deg1, deg2] });
          }
        }
      }
    }
  }

  const allGroups = [];
  for (const key in triadMap) {
    const g = triadMap[key];
    _finalizeGroup(g, g.canonKey.split(':').map(Number), g.canonKey);
    allGroups.push(g);
  }

  allGroups.sort((a, b) => a.lowestRoot - b.lowestRoot || a.bestError - b.bestError);
  return allGroups;
}

function _finalizeGroup(g, canonNums, canonical) {
  g.canonical = canonical;
  g.maxNum = Math.max.apply(null, canonNums);
  g.lowestRoot = Math.min.apply(null, canonNums);
  let bestErr = Infinity;
  const invList = [];
  for (const key in g.inversions) {
    const inv = g.inversions[key];
    const seen = new Set();
    const filtered = [];
    for (const r of inv.roots) {
      const k = r.degrees.slice().sort((a,b)=>a-b).join(',');
      if (!seen.has(k)) { seen.add(k); filtered.push(r); }
    }
    inv.roots = filtered;
    if (inv.rmsError < bestErr) bestErr = inv.rmsError;
    invList.push(inv);
  }
  invList.sort((a, b) => {
    const aN = a.notation.split(':').map(Number);
    const bN = b.notation.split(':').map(Number);
    return Math.min.apply(null, aN) - Math.min.apply(null, bN);
  });
  g.invList = invList;
  g.bestError = bestErr;
  delete g.inversions;
}

let _cachedTriads = [];
let _cachedTriadScale = null;
let _chordLastRenderTime = 0;
let _chordTrailingTimer = null;
const _chordThrottleMs = 30;

function getChords() {
  if (!S.selected || S.generatorCents === null) return [];
  const n = S.selected.size;
  const scale = rotateMOSScale(buildMOSScale(S.generatorCents, n, 1200), S.modeRotation, 1200);
  const scaleKey = scale.pitches.map(p => p.toFixed(1)).join(',');
  if (scaleKey !== _cachedTriadScale) {
    _cachedTriadScale = scaleKey;
    _cachedTriads = findScaleChords(scale.pitches, 35, 200);
  }
  return _cachedTriads;
}

let _chordMaxRoot = 50;
let _chordMaxRMS = 30;
let _chordFiltersBound = false;

function ensureChordFilters(container) {
  let filterEl = document.getElementById('chord-filter-bar');
  if (filterEl) return;

  h += '</div>';
