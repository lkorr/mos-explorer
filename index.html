  _chordFiltersBound = false;
}

function renderChordsPanel() {
  const colEl = document.getElementById('sp-chords-col');
  if (!S.selected || S.generatorCents === null) {
    colEl.innerHTML = '';
    _chordFiltersBound = false;
    return;
  }
  getChords();
  ensureChordFilters(colEl);
  if (!_chordFiltersBound) {
    _chordFiltersBound = true;
    _bindChordFilter();
  }
  renderChordHighlights();
  return;
  /* disabled chord table code below */
  if (false) {
  const now = performance.now();
  const elapsed = now - _chordLastRenderTime;
  if (elapsed < _chordThrottleMs) {
    clearTimeout(_chordTrailingTimer);
    _chordTrailingTimer = setTimeout(renderChordsPanel, _chordThrottleMs - elapsed);
    return;
  }
  clearTimeout(_chordTrailingTimer);
  _chordLastRenderTime = now;

  ensureChordFilters(colEl);
  const tableEl = document.getElementById('chord-table-body');
  const typeLabel = document.getElementById('chord-type-label');

  const groups = getChords();
  const n = S.selected.size;
  const chordGroupsOut = [];
  for (const g of groups) {
    const matching = g.invList.filter(inv => inv.type === 3 && inv.maxNum <= _chordMaxRoot && inv.rmsError <= _chordMaxRMS);
    if (!matching.length) continue;
    const bestMatchErr = Math.min.apply(null, matching.map(inv => inv.rmsError));
    chordGroupsOut.push({ canonical: g.canonical, bestError: bestMatchErr, invList: matching });
    if (chordGroupsOut.length >= 60) break;
  }

  if (!chordGroupsOut.length) {
    tableEl.innerHTML = '<div style="color:#556;font-size:11px">None found</div>';
  } else {
    let h = '<table class="chord-matrix"><thead><tr>';
    h += '<th class="cm-label"></th>';
    for (let d = 0; d < n; d++) h += `<th>${d}</th>`;
    h += '<th class="cm-err">¢</th>';
    h += '</tr></thead><tbody>';
    for (const g of chordGroupsOut) {
      const invs = g.invList;
      const activeInv = invs[0];
      const rootSet = new Set(activeInv.roots.map(r => r.root));
      const rootDegMap = {};
      for (const r of activeInv.roots) rootDegMap[r.root] = r.degrees;
      const allDegs = activeInv.roots.map(r => r.degrees);
      const invsData = JSON.stringify(invs.map(inv => ({
        notation: inv.notation, rms: inv.rmsError.toFixed(1),
        roots: inv.roots.map(r => ({ root: r.root, degrees: r.degrees }))
      })));
      const hasInversions = invs.length > 1;
      h += `<tr class="chord-row" data-all-degrees='${JSON.stringify(allDegs)}' data-invs='${invsData.replace(/'/g, '&#39;')}' data-inv-idx="0">`;
      h += `<td class="cm-label"><a href="https://en.xen.wiki/w/${activeInv.notation}" target="_blank" class="cm-chord-name">${activeInv.notation}</a>`;
      if (hasInversions) h += `<span class="cm-invert" title="Cycle inversion">&#x25B8;</span>`;
      h += `</td>`;
      for (let d = 0; d < n; d++) {
        if (rootSet.has(d)) {
          const degs = rootDegMap[d].join(',');
          h += `<td><span class="cm-dot cr-root" data-degrees="${degs}">●</span></td>`;
        } else {
          h += '<td class="cm-empty">·</td>';
        }
      }
      h += `<td class="cm-err">${activeInv.rmsError.toFixed(1)}</td>`;
      h += '</tr>';
    }
    h += '</tbody></table>';
    tableEl.innerHTML = h;
  }

  if (!_chordFiltersBound) {
    _chordFiltersBound = true;
    _bindChordFilter();
  }
  renderChordHighlights();
  } /* end if(false) disabled block */
}

function _bindChordFilter() {
  const maxSlider = document.getElementById('chord-max-root');
  if (maxSlider) maxSlider.addEventListener('input', e => {
    _chordMaxRoot = +e.target.value;
    document.getElementById('chord-max-root-val').textContent = _chordMaxRoot;
    _updateChordTable();
  });
  // Click on root degree to play chord, or invert button to cycle inversion
  const col = document.getElementById('sp-chords-col');
  if (col) col.addEventListener('click', e => {
      const invertBtn = e.target.closest('.cm-invert');
      if (invertBtn) {
        const row = invertBtn.closest('.chord-row');
        if (!row) return;
        const invs = JSON.parse(row.dataset.invs || '[]');
        if (invs.length < 2) return;
        let idx = (+row.dataset.invIdx + 1) % invs.length;
        row.dataset.invIdx = idx;
        const inv = invs[idx];
        const nameEl = row.querySelector('.cm-chord-name');
        if (nameEl) {
          nameEl.textContent = inv.notation;
          nameEl.href = 'https://en.xen.wiki/w/' + inv.notation;
        }
        const errEl = row.querySelector('.cm-err');
        if (errEl) errEl.textContent = inv.rms;
        // Rebuild dots for this inversion
        const rootSet = new Set(inv.roots.map(r => r.root));
        const rootDegMap = {};
        for (const r of inv.roots) rootDegMap[r.root] = r.degrees;
        const cells = row.querySelectorAll('td:not(.cm-label):not(.cm-err)');
        for (let d = 0; d < cells.length; d++) {
          if (rootSet.has(d)) {
            const degs = rootDegMap[d].join(',');
            cells[d].innerHTML = `<span class="cm-dot cr-root" data-degrees="${degs}">●</span>`;
            cells[d].className = '';
          } else {
            cells[d].innerHTML = '·';
            cells[d].className = 'cm-empty';
          }
        }
        // Update allDegrees for highlight matching
        const allDegs = [];
        for (const r of inv.roots) allDegs.push(r.degrees);
        row.dataset.allDegrees = JSON.stringify(allDegs);
        return;
      }
      const rootEl = e.target.closest('.cr-root');
      if (!rootEl) return;
      const degrees = rootEl.dataset.degrees.split(',').map(Number);
      playChordDegrees(degrees);
    });
}

function _updateChordTable() {
  _chordLastRenderTime = 0;
  renderChordsPanel();
}

let _chordNoteCounter = 0;
let _chordActiveCodes = [];

const _killFadeMs = 0.02;

function killChordNotes() {
  const actx = SYNTH.ctx;
  if (!actx) { _chordActiveCodes = []; return; }
  const now = actx.currentTime;
  for (const code of _chordActiveCodes) {
    const entry = SYNTH._activeKeys[code];
    if (!entry) continue;
    try {
      entry.gain.gain.cancelScheduledValues(now);
      entry.gain.gain.setValueAtTime(entry.gain.gain.value, now);
      entry.gain.gain.linearRampToValueAtTime(0, now + _killFadeMs);
      entry.osc.stop(now + _killFadeMs + 0.01);
    } catch {}
    if (entry.degreeInScale !== undefined) {
      noteGlowOff(entry.degreeInScale, entry.glowId);
    }
    delete SYNTH._activeKeys[code];
  }
  _chordActiveCodes = [];
}

function playChordDegrees(degrees) {
  if (!S.selected || S.generatorCents === null) return;
  killChordNotes();
  const n = S.selected.size;
  const scale = rotateMOSScale(buildMOSScale(S.generatorCents, n, 1200), S.modeRotation, 1200);
  const rootDeg = ((degrees[0] % n) + n) % n;
  const rootCents = scale.pitches[rootDeg];
  const actx = getAudioCtx();
  const startAt = actx.currentTime + _killFadeMs + 0.005;
  const attack = Math.max(SYNTH.attack, 0.02);
  const holdMs = (attack + SYNTH.decay + 0.15) * 1000;
  const codes = [];
  for (const deg of degrees) {
    const degInScale = ((deg % n) + n) % n;
    let octaveExtra = 0;
    if (scale.pitches[degInScale] < rootCents) octaveExtra = 1;
    const code = `_chord_${_chordNoteCounter++}`;
    startNote(code, degInScale, SYNTH.octaveShift + octaveExtra, startAt);
    codes.push(code);
  }
  _chordActiveCodes = codes;
  renderChordHighlights();
  setTimeout(() => { for (const c of codes) stopKeyNote(c); }, holdMs + (_killFadeMs * 1000));
}

let _chordSlots = [];

const _chordNameMap = {};
const _chordNameExact = { '6:8:9': 'sus4', '8:9:12': 'sus2' };
(function() {
  const defs = [
    [[4,5,6], 'major'],
    [[10,12,15], 'minor'],
    [[5,6,7], 'dim'],
    [[14,18,21], 'supermajor'],
    [[6,7,9], 'subminor'],
    [[26,30,39], 'inframinor'],
    [[10,13,15], 'ultramajor'],
    [[22,26,33], 'minthmic minor'],
    [[22,28,33], 'pentacircle major'],
  ];
  for (const [nums, name] of defs) {
    _chordNameMap[_canonKey3(nums[0], nums[1], nums[2])] = name;
  }
})();

let _lastTriadSlots = [];
let _lastDyadSlots = [];

function renderChordHighlights() {
  const label = document.getElementById('active-chord-label');
  const activeEntries = Object.values(SYNTH._activeKeys);
  const activeDegrees = activeEntries.map(e => e.degreeInScale);
  if (!activeDegrees.length) {
    if (label) _renderCombinedSlots(label);
    return;
  }

  let lowestEntry = activeEntries[0];
  for (const e of activeEntries) {
    if (e.noteOctave < lowestEntry.noteOctave ||
        (e.noteOctave === lowestEntry.noteOctave && e.currentCents < lowestEntry.currentCents)) {
      lowestEntry = e;
    }
  }
  const bassDegree = lowestEntry.degreeInScale;

  const activeTriads = [];
  const activeDyads = [];
  const seenNotations = new Set();
  for (const g of _cachedTriads) {
    for (const inv of g.invList) {
      if (inv.maxNum > _chordMaxRoot || inv.rmsError > _chordMaxRMS) continue;
      for (const r of inv.roots) {
        if (r.root === bassDegree && r.degrees.every(d => activeDegrees.includes(d))) {
          if (!seenNotations.has(inv.notation)) {
            seenNotations.add(inv.notation);
            activeTriads.push({ notation: inv.notation, rms: inv.rmsError.toFixed(1), name: _chordNameExact[inv.notation] || _chordNameMap[g.canonical] || '', type: 'triad' });
          }
        }
      }
    }
  }

  if (!activeTriads.length && activeDegrees.length >= 2 && S.selected && S.generatorCents !== null) {
    const n = S.selected.size;
    const scale = rotateMOSScale(buildMOSScale(S.generatorCents, n, 1200), S.modeRotation, 1200);
    const bassCents = scale.pitches[lowestEntry.degreeInScale] + lowestEntry.noteOctave * 1200;
    for (const e of activeEntries) {
      if (e === lowestEntry) continue;
      let intervalCents = (scale.pitches[e.degreeInScale] + e.noteOctave * 1200) - bassCents;
      if (intervalCents <= 0) intervalCents += 1200;
      const maxErr = _chordMaxRMS;
      const lo = jiPoolLowerBound(intervalCents - maxErr);
      let best = null;
      for (let ji_i = lo; ji_i < JI_POOL.length; ji_i++) {
        const ji = JI_POOL[ji_i];
        if (ji.cents > intervalCents + maxErr) break;
        if (ji.n > _chordMaxRoot) continue;
        const err = Math.abs(intervalCents - ji.cents);
        if (!best || err < best.err) best = { n: ji.n, d: ji.d, err };
      }
      if (best) {
        const notation = best.n + '/' + best.d;
        if (!seenNotations.has(notation)) {
          seenNotations.add(notation);
          activeDyads.push({ notation, rms: best.err.toFixed(1), name: '', type: 'dyad' });
        }
      }
    }
  }

  if (activeTriads.length) {
    _lastTriadSlots = activeTriads;
  }
  if (activeDyads.length) {
    _lastDyadSlots = activeDyads;
  }

  _chordSlots = [];
  for (const ch of _lastTriadSlots) _chordSlots.push(ch);
  for (const ch of _lastDyadSlots) _chordSlots.push(ch);

  if (label) _renderCombinedSlots(label);
}

function _renderCombinedSlots(label) {
  let html = '';
  for (const s of _lastTriadSlots) {
    const url = 'https://en.xen.wiki/w/' + encodeURIComponent(s.notation);
    const escaped = s.notation.replace(/&/g,'&amp;').replace(/</g,'&lt;');
    const nameTag = s.name ? `<span style="color:#8899bb;font-size:12px">${s.name} </span>` : '';
    html += `<div>${nameTag}<a href="${url}" target="_blank" style="color:#ff6;text-decoration:underline">${escaped}</a> <span style="color:#8899bb">(${s.rms}¢)</span></div>`;
  }
  for (const s of _lastDyadSlots) {
    const url = 'https://en.xen.wiki/w/' + encodeURIComponent(s.notation);
    const escaped = s.notation.replace(/&/g,'&amp;').replace(/</g,'&lt;');
    html += `<div><a href="${url}" target="_blank" style="color:#8cf;text-decoration:underline">${escaped}</a> <span style="color:#8899bb">(${s.rms}¢)</span></div>`;
  }
  label.innerHTML = html;
}

function positionPanel() {
  const panel = document.getElementById('selected-panel');
  if (!panel || panel.style.display === 'none') return;
  const { radius, cx, cy, sliderY } = getMOSCircleLayout(S.W, S.H);
  const panelPad = 28;
  const circleRight = cx + radius + panelPad + 8;
  const defaultHeight = S.H - (sliderY - 38);
  const height = S._panelHeight ? Math.max(80, Math.min(S.H - 40, S._panelHeight)) : defaultHeight;
  panel.style.left = circleRight + 'px';
  panel.style.top = '';
  panel.style.bottom = '0';
  panel.style.height = height + 'px';
  panel.style.display = 'flex';

}

function updatePanel() {
  updateHeldNotes();
  const panel = document.getElementById('selected-panel');
  const infoEl = document.getElementById('sp-info');
  const edoEl = document.getElementById('sp-edo-container');
  if (!S.selected) {
    panel.style.display = 'none';
    killAllNotes();
    return;
  }

  const sel = S.selected;
  const key = sel.key;
  const label = key.replace('_', ' ');
  const fname = MOS_NAMES[key];
  const nL = sel.nL, nS = sel.nS;
  const parent = findParentMOS(nL, nS);
  const children = getChildMOSes(key);
  const gen = S.generatorCents;

  // Left info section
  const wikiUrl = `https://en.xen.wiki/w/${key}`;
  let h = `<div class="sp-title"><a href="${wikiUrl}" target="_blank" style="color:#e94560;text-decoration:none">${label}${fname ? ' — '+fname : ''}</a></div>`;
  h += `<div style="color:#aaa;margin-bottom:3px;font-size:13px">${nL+nS} notes (${nL}L + ${nS}s)</div>`;
  h += `<div style="color:#ccc;font-size:12px;margin-bottom:3px">${sel.lowCents.toFixed(1)}¢ — ${sel.highCents.toFixed(1)}¢</div>`;

  if (parent) {
    const pn = MOS_NAMES[parent];
    const parentNavigable = S.regions.some(r =>
      r.key === parent && r.size >= S.minSize && r.size <= S.maxSize);
    h += `<div style="font-size:12px;margin-bottom:2px">`;
    if (parentNavigable) {
      h += `<a href="#" onclick="navigateToParent();return false" style="color:#f5a623;text-decoration:none;cursor:pointer" title="Navigate to parent">&#x25B2;</a> `;
    }
    h += `Parent: <a href="#" onclick="navigateToParent();return false" style="color:#f5a623;text-decoration:none;cursor:pointer">${parent.replace('_',' ')}${pn ? ' ('+pn+')' : ''}</a></div>`;
  }

  const childNavigable = children.some(ck => S.regions.some(r =>
    r.key === ck && r.size >= S.minSize && r.size <= S.maxSize));
  h += `<div style="font-size:12px;margin-bottom:2px">`;
  if (childNavigable) {
    h += `<a href="#" onclick="navigateToChild();return false" style="color:#6eb5ff;text-decoration:none;cursor:pointer" title="Navigate to child">&#x25BC;</a> `;
  }
  h += `Children: `;
  h += children.map(c => {
    const cn = MOS_NAMES[c];
    return `<a href="#" onclick="navigateToChildByKey('${c}');return false" style="color:#6eb5ff;text-decoration:none;cursor:pointer">${c.replace('_',' ')}${cn ? ' ('+cn+')' : ''}</a>`;
  }).join(', ');
  h += '</div>';

  if (gen !== null) {
    const swUrl = buildScaleWorkshopURL();
    if (swUrl) {
      h += `<div style="margin-top:4px;margin-bottom:4px"><a href="${swUrl}" target="_blank" style="color:#4cc9f0;text-decoration:none;font-size:11px">&#x266B; Open in Scale Workshop</a></div>`;
    }
    const activeTemps = getTemperamentsAtCursor(key, gen, sel.lowCents, sel.highCents);
    if (activeTemps.length) {
      h += '<div class="temp-info">';
      for (const t of activeTemps) {
        const col = TEMP_COLORS[t.name] || '#50c878';
        const tempNameHtml = t.wikiUrl
          ? `<a href="${t.wikiUrl}" target="_blank" style="color:${col};text-decoration:none">${t.name}</a>`
          : t.name;
        h += `<div class="temp-info-name" style="color:${col}">${tempNameHtml}</div>`;
        h += `<div class="temp-info-desc">${t.description}</div>`;
        if (t.commas && t.commas.length) {
          h += '<div class="temp-info-commas">Commas: ';
          h += t.commas.map((c, i) => `<span class="temp-comma">${c}</span>${t.commaNames[i] ? ' <span class="temp-comma-name">(' + t.commaNames[i] + ')</span>' : ''}`).join(', ');
          h += '</div>';
        }
        const mosList = Array.isArray(t.mos) ? t.mos : [t.mos];
        if (mosList.length > 1) {
          h += '<div class="temp-info-mos">MOS: ' + mosList.map(m => `<span class="temp-mos${m === sel.key ? ' temp-mos-active' : ''}">${m.replace('_', ' ')}</span>`).join(' → ') + '</div>';
        }
      }
      h += '</div>';
    }
  }

  infoEl.innerHTML = h;
  renderChordsPanel();
  renderPlaybackControls();

  // Mode rotation transfer when switching MOS
  if (S._edoTableKey !== key) {
    if (S._edoTableKey && S.generatorCents !== null && S.modeRotation !== 0) {
      const oldN = parseInt(S._edoTableKey.split('L')[0]) + parseInt(S._edoTableKey.split('_')[1]);
      const oldChain = getGeneratorChain(S.generatorCents, oldN);
      const oldRootGen = oldChain[S.modeRotation % oldN];
      const oldFrac = oldN > 1 ? oldRootGen / (oldN - 1) : 0;
      const newN = nL + nS;
      const newChain = getGeneratorChain(S.generatorCents, newN);
      const targetGen = Math.round(oldFrac * (newN - 1));
      S.modeRotation = newChain.indexOf(targetGen);
      if (S.modeRotation < 0) S.modeRotation = 0;
    } else {
      S.modeRotation = 0;
    }
    S._edoTableKey = key;
    S._rulerBuiltKey = null;
  }

  panel.style.display = 'flex';
  positionPanel();
  renderEDOGrid();
}

// Build harmonic ratios N/D where N,D <= 31, N > D, gcd(N,D)=1
function buildHarmonicRatios() {
  if (S._harmonicRatios) return S._harmonicRatios;
  const ratios = [];
  for (let d = 1; d <= 31; d++) {
    for (let n = d + 1; n <= 31; n++) {
      if (gcd(n, d) !== 1) continue;
      const cents = 1200 * Math.log2(n / d);
      if (cents > 0 && cents <= 1200) {
        ratios.push({ n, d, cents, label: `${n}/${d}` });
      }
    }
  }
  ratios.sort((a, b) => (a.n + a.d) - (b.n + b.d) || a.cents - b.cents);
  S._harmonicRatios = ratios;
  return ratios;
}

function drawRulerCanvas(canvas, centerCents, harmonics, pxPerCent, isGen) {
  const track = canvas.parentElement;
  const rect = track.getBoundingClientRect();
  if (rect.width === 0) return;
  const dpr = window.devicePixelRatio || 1;
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  const w = rect.width, ht = rect.height;
  ctx.clearRect(0, 0, w, ht);

  const viewHalf = (w / 2) / pxPerCent;
  const viewLow = centerCents - viewHalf;
  const viewHigh = centerCents + viewHalf;

  // Cent tick marks
  const startCent = Math.floor(viewLow);
  for (let c = startCent; c <= viewHigh; c++) {
    const x = (c - viewLow) * pxPerCent;
    const isMajor = c % 5 === 0;
    ctx.strokeStyle = isMajor ? '#2a3a5a' : '#1a2235';
    ctx.lineWidth = isMajor ? 1 : 0.5;
    ctx.beginPath();
    ctx.moveTo(x, ht * 0.4);
    ctx.lineTo(x, ht * 0.6);
    ctx.stroke();
  }

  // Harmonic ratio markers
  const visible = harmonics.filter(r => r.cents >= viewLow - 2 && r.cents <= viewHigh + 2);
  visible.sort((a, b) => (a.n * a.d) - (b.n * b.d));

  const minLabelPx = isGen ? 44 : 36;
  const placed = [];

  for (const r of visible) {
    const x = Math.round((r.cents - viewLow) * pxPerCent);
    if (placed.some(px => Math.abs(x - px) < minLabelPx)) continue;
    placed.push(x);

    const complexity = r.n * r.d;
    // 2/1=2, 3/2=6, 5/4=20, 7/4=28, 11/8=88, 25/18=450, 31/30=930
    const simple = Math.max(0, 1 - Math.log(complexity) / Math.log(961));
    const dist = Math.abs(r.cents - centerCents);
    const distFade = Math.max(0.3, 1 - (dist / viewHalf) * 0.6);
    const isClose = dist < 0.5;

    const lineAlpha = isClose ? 1 : (0.15 + simple * 0.55) * distFade;
    const lineWidth = isClose ? 2.5 : 0.5 + simple * 2;
    const tickTop = isGen ? 6 : 4;
    const tickBot = isGen ? ht - 6 : ht - 4;

    const lineColor = isClose ? '#50c878' : `rgba(110,181,255,${lineAlpha})`;
    ctx.strokeStyle = lineColor;
    ctx.lineWidth = lineWidth;
    ctx.beginPath();
    ctx.moveTo(x + 0.5, tickTop);
    ctx.lineTo(x + 0.5, tickBot);
    ctx.stroke();

    const baseFontSize = isGen ? 13 : 11;
    const fontSize = Math.round(baseFontSize - 3 * (1 - simple));
    const textAlpha = isClose ? 1 : (0.3 + simple * 0.7) * distFade;
    ctx.fillStyle = isClose ? '#e0ffe0' : `rgba(220,230,250,${textAlpha})`;
    ctx.font = `bold ${fontSize}px monospace`;
    ctx.textAlign = 'center';
    ctx.fillText(r.label, x, isGen ? Math.round(ht * 0.35) : Math.round(ht * 0.32));

    if (isGen) {
      ctx.fillStyle = isClose ? '#7ac898' : `rgba(136,153,187,${textAlpha * 0.7})`;
      ctx.font = `${Math.max(9, fontSize - 2)}px monospace`;
      ctx.fillText(r.cents.toFixed(1) + '¢', x, Math.round(ht - 8));
    }
  }
}

function renderEDOGrid() {
  const edoEl = document.getElementById('sp-edo-container');
  const sel = S.selected;
  if (!sel) return;

  const genCents = S.generatorCents !== null ? S.generatorCents : (sel.lowCents + sel.highCents) / 2;
  const hr = computeHardness(genCents, sel.size);
  const hardnessStr = hr.ratio === Infinity ? '∞' : hr.ratio.toFixed(2);
  const harmonics = buildHarmonicRatios();

  const baseScale = buildMOSScale(genCents, sel.size, 1200);
  const scale = rotateMOSScale(baseScale, S.modeRotation || 0, 1200);
  const intervals = scale.pitches.slice(1);

  const rulerKey = sel.key + '|' + intervals.length + '|' + S.rulerSort + (S.rulerSort === 'generator' ? '|' + (S.modeRotation || 0) : '');
  if (S._rulerBuiltKey !== rulerKey) {
    const n = intervals.length + 1;
    const chain = getGeneratorChain(genCents, n, 1200);
    const rot = S.modeRotation || 0;
    const rootGenIdx = chain[rot];
    const byGen = S.rulerSort === 'generator';

    const rotatedPitches = scale.pitches;
    const origPitches = baseScale.pitches;

    const genDistances = [];
    for (let i = 1; i < n; i++) {
      const rotCents = rotatedPitches[i];
      let origPos = -1;
      for (let j = 0; j < n; j++) {
        const shifted = ((origPitches[j] - origPitches[rot]) % 1200 + 1200) % 1200;
        if (Math.abs(shifted - rotCents) < 0.01) { origPos = j; break; }
      }
      const genIdx = origPos >= 0 ? chain[origPos] : 0;
      const dist = ((genIdx - rootGenIdx) % n + n) % n;
      genDistances.push({ intervalIdx: i - 1, genDist: dist });
    }

    let sortOrder;
    if (byGen) {
      sortOrder = genDistances.slice().sort((a, b) => a.genDist - b.genDist).map(d => d.intervalIdx);
    } else {
      sortOrder = Array.from({length: intervals.length}, (_, i) => i);
    }

    const genDistMap = {};
    for (const d of genDistances) genDistMap[d.intervalIdx] = d.genDist;

    let h = '<div class="edo-ruler-header">';
    h += '<span class="edo-ruler-cents"></span>';
    h += '<span class="edo-ruler-hardness"></span>';
    h += `<button class="ruler-sort-btn" onclick="toggleRulerSort()" title="Toggle ruler ordering">`;
    h += byGen
      ? `<span class="sort-active">gen stack</span> / degree`
      : `gen stack / <span class="sort-active">degree</span>`;
    h += `</button>`;
    h += '<span class="edo-ruler-temps"></span>';
    h += '</div>';

    h += '<div class="interval-ruler" data-ruler="gen">';
    h += '<div class="interval-ruler-label"><span class="degree-name">Generator</span> <span class="degree-ratio"></span></div>';
    h += '<div class="interval-ruler-track gen-track">';
    h += '<div class="ruler-indicator"></div>';
    h += '<canvas class="ruler-canvas"></canvas>';
    h += '</div></div>';

    h += '<div class="edo-rulers-scroll">';
    for (const i of sortOrder) {
      const genDist = genDistMap[i];
      h += `<div class="interval-ruler" data-ruler="${i}">`;
      h += `<div class="interval-ruler-label"><span class="degree-name">Degree ${i + 1}</span>`;
      if (byGen) h += ` <span style="color:#f5a623;font-size:10px">(${genDist}g)</span>`;
      h += ` <span class="degree-cents"></span> <span class="degree-ratio"></span></div>`;
      h += '<div class="interval-ruler-track">';
      h += '<div class="ruler-indicator"></div>';
      h += '<canvas class="ruler-canvas"></canvas>';
      h += '</div></div>';
    }
    h += '</div>';

    edoEl.innerHTML = h;
    S._rulerBuiltKey = rulerKey;
    setupRulerInteraction(edoEl);
  }

  edoEl.querySelector('.edo-ruler-cents').textContent = genCents.toFixed(2) + '¢';
  edoEl.querySelector('.edo-ruler-hardness').textContent = hardnessStr;

  const tempsSpan = edoEl.querySelector('.edo-ruler-temps');
  if (tempsSpan) {
    const matchedTemps = getTemperamentsAtCursor(sel.key, genCents, sel.lowCents, sel.highCents);
    if (matchedTemps.length > 0) {
      tempsSpan.innerHTML = matchedTemps.map(t => {
        const color = TEMP_COLORS[t.name] || '#dda0dd';
        return t.wikiUrl
          ? `<a href="${t.wikiUrl}" target="_blank" style="color:${color}">${t.name}</a>`
          : `<span style="color:${color}">${t.name}</span>`;
      }).join(', ');
    } else {
      tempsSpan.innerHTML = '';
    }
  }

  // Draw generator ruler
  const genRuler = edoEl.querySelector('[data-ruler="gen"]');
  const genRatioSpan = genRuler && genRuler.querySelector('.degree-ratio');
  if (genRatioSpan) {
    let closest = null, closestDist = Infinity;
    for (const r of harmonics) {
      const d = Math.abs(r.cents - genCents);
      if (d < closestDist) { closestDist = d; closest = r; }
    }
    if (closest && closestDist < 15) {
      const url = `https://en.xen.wiki/w/${closest.n}/${closest.d}`;
      genRatioSpan.innerHTML = `≈ <a href="${url}" target="_blank">${closest.label}</a>`;
    } else {
      genRatioSpan.innerHTML = '';
    }
  }
  const genCanvas = genRuler && genRuler.querySelector('.ruler-canvas');
  if (genCanvas) drawRulerCanvas(genCanvas, genCents, harmonics, 30, true);

  // Draw interval rulers
  const scrollContainer = edoEl.querySelector('.edo-rulers-scroll');
  if (scrollContainer) {
    for (let i = 0; i < intervals.length; i++) {
      const rulerEl = scrollContainer.querySelector(`[data-ruler="${i}"]`);
      if (!rulerEl) continue;
      const centsLabel = rulerEl.querySelector('.degree-cents');
      if (centsLabel) centsLabel.textContent = intervals[i].toFixed(1) + '¢';

      const ratioSpan = rulerEl.querySelector('.degree-ratio');
      if (ratioSpan) {
        let closest = null, closestDist = Infinity;
        for (const r of harmonics) {
          const d = Math.abs(r.cents - intervals[i]);
          if (d < closestDist) { closestDist = d; closest = r; }
        }
        if (closest && closestDist < 15) {
          const url = `https://en.xen.wiki/w/${closest.n}/${closest.d}`;
          ratioSpan.innerHTML = `≈ <a href="${url}" target="_blank">${closest.label}</a>`;
        } else {
          ratioSpan.innerHTML = '';
        }
      }

      const canvas = rulerEl.querySelector('.ruler-canvas');
      if (canvas) drawRulerCanvas(canvas, intervals[i], harmonics, 30, false);
    }
  }
}

function findMatchingEDO(genCents, mosSize) {
  for (const g of S.edos) {
    if (Math.abs(g.cents - genCents) < 0.001) return g;
  }
  return null;
}

function buildScaleWorkshopURL() {
  if (!S.selected || S.generatorCents === null) return null;
  const gen = S.generatorCents;
  const n = S.selected.size;
  const baseScale = buildMOSScale(gen, n, 1200);
  const scale = rotateMOSScale(baseScale, S.modeRotation || 0, 1200);
  const pitches = scale.pitches.slice(1);

  const edoMatch = findMatchingEDO(gen, n);

  let lines;
  let scaleName;
  if (edoMatch) {
    const edo = edoMatch.edo;
    const edoPitches = pitches.map(c => Math.round(c / (1200 / edo)));
    edoPitches.push(edo);
    lines = edoPitches.map(s => s + '\\' + edo);
    const mosLabel = S.selected.key.replace('_', ' ');
    scaleName = `${edo}edo ${mosLabel} (${edoMatch.step}\\${edo} gen)`;
  } else {
    const centsLines = pitches.map(c => c.toFixed(3));
    centsLines.push('1200.000');
    lines = centsLines;
    const mosLabel = S.selected.key.replace('_', ' ');
    scaleName = `${mosLabel} (${gen.toFixed(2)}¢ gen)`;
  }

  const data = encodeURIComponent(lines.join('\n'));
  const name = encodeURIComponent(scaleName);
  return `https://scaleworkshop.plainsound.org/?name=${name}&data=${data}`;
}

function toggleRulerSort() {
  S.rulerSort = S.rulerSort === 'degree' ? 'generator' : 'degree';
  renderEDOGrid();
}

function rulerSetGenFromCents(cents) {
  const sel = S.selected;
  if (!sel) return;
  if (cents < sel.lowCents || cents > sel.highCents) {
    const clamped = Math.max(0, Math.min(1200, cents));
    const adj = findAdjacentRegion(sel, clamped);
    if (adj) {
      S.selected = adj;
      S.generatorCents = Math.max(adj.lowCents, Math.min(adj.highCents, clamped));
      updatePanel();
      render();
      return;
    }
  }
  S.generatorCents = Math.max(sel.lowCents, Math.min(sel.highCents, cents));
  updatePanel();
  render();
}

function setupRulerGlobalHandlers() {
  if (S._rulerGlobalInit) return;
  S._rulerGlobalInit = true;

  document.addEventListener('mousemove', e => {
    if (!S._rulerDragging || !S.selected) return;
    const dx = e.clientX - S._rulerDragStartX;
    rulerSetGenFromCents(S._rulerDragStartCents - dx / 30);
  });

  document.addEventListener('mouseup', () => {
    if (!S._rulerDragging) return;
    S._rulerDragging = false;
    const track = document.querySelector('.gen-track');
    if (track) track.style.cursor = 'grab';
  });
}

function setupRulerInteraction(edoEl) {
  const track = edoEl.querySelector('.gen-track');
  if (!track) return;

  setupRulerGlobalHandlers();

  track.addEventListener('mousedown', e => {
    if (!S.selected) return;
    S._rulerDragging = true;
    S._rulerDragStartX = e.clientX;
    S._rulerDragStartCents = S.generatorCents !== null ? S.generatorCents : (S.selected.lowCents + S.selected.highCents) / 2;
    track.style.cursor = 'grabbing';
    e.preventDefault();
  });

  track.addEventListener('wheel', e => {
    if (!S.selected) return;
    e.preventDefault();
    e.stopPropagation();
    const delta = e.deltaY > 0 ? 0.15 : -0.15;
    const genCents = S.generatorCents !== null ? S.generatorCents : (S.selected.lowCents + S.selected.highCents) / 2;
    rulerSetGenFromCents(genCents + delta);
  }, { passive: false });
}

//  INTERACTION — Event setup

function setup() {
  const cntr = document.getElementById('canvas-container');
  const cvs = S.canvas;

  // Zoom
  cntr.addEventListener('wheel', e => {
    e.preventDefault();
    if (S.genDragging || S.sliderDragging) return;
    const rect = cvs.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const mc = x2c(mx);
    const zf = e.deltaY > 0 ? 1.15 : 1/1.15;
    const range = S.viewMax - S.viewMin;
    const nr = Math.min(1200, Math.max(0.3, range * zf));
    const ratio = mx / S.W;
    S.viewMin = mc - ratio * nr;
    S.viewMax = mc + (1 - ratio) * nr;
    clampView();
    updateInfo();
    render();
  }, { passive: false });

  cntr.addEventListener('dblclick', e => {
    const rect = cvs.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    if (hitCircleResizeGrip(mx, my)) {
      S._circleRadius = null;
      render();
    }
  });

  cntr.addEventListener('mousedown', e => {
    const rect = cvs.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    if (hitCircleResizeGrip(mx, my)) {
      S.circleResizing = true;
      S.circleResizeStartX = e.clientX;
      S.circleResizeStartY = e.clientY;
      const { radius } = getMOSCircleLayout(S.W, S.H);
      S.circleResizeStartR = radius;
      cvs.style.cursor = 'nesw-resize';
      e.preventDefault();
      return;
    }

    if (hitSizeScrollbar(mx, my)) {
      S.sizeSbDragging = true;
      setSizeFromScrollbarY(my);
      cvs.style.cursor = 'ns-resize';
      return;
    }

    const modeAction = hitModeButton(mx, my);
    if (modeAction) { handleModeButton(modeAction); return; }

    const arrow = hitCircleArrow(mx, my);
    if (arrow === 'parent') { navigateToParent(); return; }
    if (arrow === 'child') { navigateToChild(); return; }

    if (S.selected && hitSlider(mx, my)) {
      S.sliderDragging = true;
      S.generatorCents = sliderXToGen(mx);
      cvs.style.cursor = 'ew-resize';
      render();
      return;
    }

    const dot = hitCircleDot(mx, my);
    if (dot) { playCircleDot(dot); return; }

    if (hitMOSCirclePanel(mx, my)) return;

    if (S.selected && isOnAxisBar(my)) {
      const cc = x2c(mx);
      if (cc >= S.selected.lowCents && cc <= S.selected.highCents) {
        S.genDragging = true;
        S.generatorCents = cc;
        cvs.style.cursor = 'ew-resize';
        render();
        return;
      }
    }

    S.dragging = true;
    S.dragX0 = e.clientX;
    S.dragY0 = e.clientY;
    S.dragMin0 = S.viewMin;
    S.dragMax0 = S.viewMax;
    S.dragMinSize0 = S.minSize;
    cvs.style.cursor = 'grabbing';
  });

  window.addEventListener('mousemove', e => {
    const rect = cvs.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    if (S.circleResizing) {
      const dx = e.clientX - S.circleResizeStartX;
      const dy = -(e.clientY - S.circleResizeStartY);
      const delta = Math.max(dx, dy);
      S._circleRadius = S.circleResizeStartR + delta;
      render();
      return;
    }

    if (S.sizeSbDragging) {
      setSizeFromScrollbarY(my);
      return;
    }

    if (S.sliderDragging) {
      S.generatorCents = sliderXToGen(mx);
      updatePanel();
      render();
      return;
    }

    if (S.genDragging) {
      setGenFromScreenX(mx);
      return;
    }

    if (S.dragging) {
      const dx = e.clientX - S.dragX0;
      const dy = e.clientY - S.dragY0;
      const cpp = (S.dragMax0 - S.dragMin0) / S.W;
      S.viewMin = S.dragMin0 - dx * cpp;
      S.viewMax = S.dragMax0 - dx * cpp;
      clampView();
      const sizeSensitivity = 0.05;
      const newMin = Math.round(Math.max(2, Math.min(100, S.dragMinSize0 - dy * sizeSensitivity)));
      if (newMin !== S.minSize) {
        S.minSize = newMin;
        document.getElementById('min-size').value = S.minSize;
        document.getElementById('min-size-val').textContent = S.minSize;
        if (S.minSize > S.maxSize) {
          S.maxSize = S.minSize;
          document.getElementById('max-mos-size').value = S.maxSize;
          document.getElementById('max-mos-val').textContent = S.maxSize;
        }
        recalc();
      } else {
        updateInfo();
        render();
      }
    } else if (e.target.closest('#selected-panel')) {
      if (S.hovered) {
        S.hovered = null;
        document.getElementById('tooltip').style.display = 'none';
        cvs.style.cursor = '';
        render();
      }
    } else {
      hitTest(mx, my, e);
      if (hitCircleResizeGrip(mx, my)) {
        cvs.style.cursor = 'nesw-resize';
      } else if (hitModeButton(mx, my)) {
        cvs.style.cursor = 'pointer';
      } else if (hitSizeScrollbar(mx, my)) {
        cvs.style.cursor = 'ns-resize';
      } else if (hitCircleArrow(mx, my)) {
        cvs.style.cursor = 'pointer';
      } else if (hitCircleDot(mx, my)) {
        cvs.style.cursor = 'pointer';
      } else if (hitTempBar(mx, my)) {
        cvs.style.cursor = 'pointer';
      } else if (hitEDOMarker(mx, my)) {
        cvs.style.cursor = 'pointer';
      } else if (S.selected && hitSlider(mx, my)) {
        cvs.style.cursor = 'ew-resize';
      } else if (S.selected && isOnAxisBar(my)) {
        const cc = x2c(mx);
        if (cc >= S.selected.lowCents && cc <= S.selected.highCents) {
          cvs.style.cursor = 'crosshair';
        } else if (!S.hovered) {
          cvs.style.cursor = '';
        }
      } else if (!S.hovered) {
        cvs.style.cursor = '';
      }
    }

    if (mx >= 0 && mx <= S.W) {
      document.getElementById('cursor-display').textContent = x2c(mx).toFixed(2) + '¢';
    }
  });

  window.addEventListener('mouseup', e => {
    if (S.circleResizing) {
      S.circleResizing = false;
      cvs.style.cursor = '';
      render();
      return;
    }
    if (S.sizeSbDragging) {
      S.sizeSbDragging = false;
      cvs.style.cursor = '';
      render();
      return;
    }
    if (S.sliderDragging) {
      S.sliderDragging = false;
      cvs.style.cursor = '';
      clearTimeout(_chordTrailingTimer);
      _chordLastRenderTime = 0;
      renderChordsPanel();
      return;
    }
    if (S.genDragging) {
      S.genDragging = false;
      cvs.style.cursor = '';
      clearTimeout(_chordTrailingTimer);
      _chordLastRenderTime = 0;
      renderChordsPanel();
      return;
    }
    if (S.dragging) {
      S.dragging = false;
      cvs.style.cursor = '';
      if (Math.abs(e.clientX - S.dragX0) < 3 && Math.abs(e.clientY - S.dragY0) < 3) {
        const rect = cvs.getBoundingClientRect();
        S._lastClickX = e.clientX - rect.left;
        S._lastClickY = e.clientY - rect.top;
        handleClick();
      }
    }
  });

  // Touch
  let t0x = 0, t0y = 0, pinchD0 = 0, pinchMin0 = 0, pinchMax0 = 0;
  cntr.addEventListener('touchstart', e => {
    if (e.touches.length === 1) {
      const rect = cvs.getBoundingClientRect();
      const mx = e.touches[0].clientX - rect.left;
      const my = e.touches[0].clientY - rect.top;
      t0x = e.touches[0].clientX;
      t0y = e.touches[0].clientY;

      const touchModeAction = hitModeButton(mx, my);
      if (touchModeAction) {
        handleModeButton(touchModeAction);
      } else if (hitSizeScrollbar(mx, my)) {
        S.sizeSbDragging = true;
        setSizeFromScrollbarY(my);
      } else if (hitCircleArrow(mx, my)) {
        const arrow = hitCircleArrow(mx, my);
        if (arrow === 'parent') navigateToParent();
        else if (arrow === 'child') navigateToChild();
      } else if (S.selected && hitSlider(mx, my)) {
        S.sliderDragging = true;
        S.generatorCents = sliderXToGen(mx);
        render();
      } else if (hitMOSCirclePanel(mx, my)) {
        // absorb touch on circle panel — don't start drag
      } else if (S.selected && isOnAxisBar(my)) {
        const cc = x2c(mx);
        if (cc >= S.selected.lowCents && cc <= S.selected.highCents) {
          S.genDragging = true;
          S.generatorCents = cc;
          render();
        } else {
          S.dragMin0 = S.viewMin; S.dragMax0 = S.viewMax; S.dragMinSize0 = S.minSize;
        }
      } else {
        S.dragMin0 = S.viewMin; S.dragMax0 = S.viewMax; S.dragMinSize0 = S.minSize;
      }
    } else if (e.touches.length === 2) {
      S.sliderDragging = false;
      S.genDragging = false;
      pinchD0 = Math.hypot(e.touches[1].clientX-e.touches[0].clientX, e.touches[1].clientY-e.touches[0].clientY);
      pinchMin0 = S.viewMin; pinchMax0 = S.viewMax;
    }
    e.preventDefault();
  }, { passive: false });
  cntr.addEventListener('touchmove', e => {
    if (e.touches.length === 1) {
      const rect = cvs.getBoundingClientRect();
      const mx = e.touches[0].clientX - rect.left;
      const my = e.touches[0].clientY - rect.top;
      if (S.sizeSbDragging) {
        setSizeFromScrollbarY(my);
      } else if (S.sliderDragging) {
        S.generatorCents = sliderXToGen(mx);
        updateHeldNotes();
        render();
      } else if (S.genDragging) {
        setGenFromScreenX(mx);
      } else {
        const dx = e.touches[0].clientX - t0x;
        const dy = e.touches[0].clientY - t0y;
        const cpp = (S.dragMax0 - S.dragMin0) / S.W;
        S.viewMin = S.dragMin0 - dx * cpp;
        S.viewMax = S.dragMax0 - dx * cpp;
        clampView();
        const newMin = Math.round(Math.max(2, Math.min(30, S.dragMinSize0 - dy * 0.05)));
        if (newMin !== S.minSize) {
          S.minSize = newMin;
          document.getElementById('min-size').value = S.minSize;
          document.getElementById('min-size-val').textContent = S.minSize;
          if (S.minSize > S.maxSize) {
            S.maxSize = S.minSize;
            document.getElementById('max-mos-size').value = S.maxSize;
            document.getElementById('max-mos-val').textContent = S.maxSize;
          }
          recalc();
        } else {
          updateInfo(); render();
        }
      }
    } else if (e.touches.length === 2) {
      const d = Math.hypot(e.touches[1].clientX-e.touches[0].clientX, e.touches[1].clientY-e.touches[0].clientY);
      const sc = pinchD0 / d;
      const mid = (pinchMin0 + pinchMax0) / 2;
      const half = ((pinchMax0 - pinchMin0) / 2) * sc;
      S.viewMin = Math.max(0, mid - half);
      S.viewMax = Math.min(1200, mid + half);
      updateInfo(); render();
    }
    e.preventDefault();
  }, { passive: false });
  cntr.addEventListener('touchend', () => {
    const wasDragging = S.sliderDragging || S.genDragging;
    if (S.sizeSbDragging) S.sizeSbDragging = false;
    if (S.sliderDragging) S.sliderDragging = false;
    if (S.genDragging) S.genDragging = false;
    if (wasDragging) { clearTimeout(_chordTrailingTimer); _chordLastRenderTime = 0; renderChordsPanel(); }
  });

  // Resize
  window.addEventListener('resize', () => { resizeCanvas(); render(); positionPanel(); });

  window.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return;
    if (S.selected && S.generatorCents !== null) {
      if (e.key === 'ArrowLeft') { e.preventDefault(); handleModeButton('step-down'); return; }
      if (e.key === 'ArrowRight') { e.preventDefault(); handleModeButton('step-up'); return; }
      if (e.key === 'ArrowUp') { e.preventDefault(); handleModeButton('gen-up'); return; }
      if (e.key === 'ArrowDown') { e.preventDefault(); handleModeButton('gen-down'); return; }
    }
    if (!SYNTH.keyboardMode || e.repeat) return;
    if ((e.key === ' ' || e.key === 'Alt') && S.selected && S.generatorCents !== null) {
      e.preventDefault();
      const dir = e.key === 'Alt' ? -1 : 1;
      handleModeButton(dir === 1 ? 'gen-up' : 'gen-down');
      return;
    }
    const noteKey = codeToKey(e.code);
    if (!noteKey) return;
    const mapping = getKeyMapping(noteKey);
    if (!mapping) return;
    if (SYNTH.kbdLatch) {
      e.preventDefault();
      if (SYNTH._activeKeys[e.code]) {
        stopKeyNote(e.code);
      } else {
        playKeyNote(noteKey, e.code);
      }
    } else if (!SYNTH._activeKeys[e.code]) {
      e.preventDefault();
      playKeyNote(noteKey, e.code);
    }
  });

  window.addEventListener('keyup', e => {
    if (!SYNTH.keyboardMode || SYNTH.kbdLatch) return;
    if (SYNTH._activeKeys[e.code]) {
      stopKeyNote(e.code);
    }
  });

  window.addEventListener('blur', () => {
    for (const code of Object.keys(SYNTH._activeKeys)) {
      if (!code.startsWith('_chord_')) stopKeyNote(code);
    }
  });

  // Controls
  document.getElementById('min-size').addEventListener('input', e => {
    S.minSize = +e.target.value;
    document.getElementById('min-size-val').textContent = S.minSize;
    if (S.minSize > S.maxSize) {
      S.maxSize = S.minSize;
      document.getElementById('max-mos-size').value = S.maxSize;
      document.getElementById('max-mos-val').textContent = S.maxSize;
      recalc();
    } else {
      render();
    }
  });
  document.getElementById('max-mos-size').addEventListener('input', e => {
    S.maxSize = +e.target.value;
    document.getElementById('max-mos-val').textContent = S.maxSize;
    if (S.maxSize < S.minSize) {
      S.minSize = S.maxSize;
      document.getElementById('min-size').value = S.minSize;
      document.getElementById('min-size-val').textContent = S.minSize;
    }
    recalc();
  });
  document.getElementById('max-edo').addEventListener('input', e => {
    const t = +e.target.value / 1000;
    S.maxEDO = Math.round(t <= 0.5
      ? 5 * Math.pow(53 / 5, t / 0.5)
      : 53 * Math.pow(350 / 53, (t - 0.5) / 0.5));
    document.getElementById('max-edo-val').textContent = S.maxEDO;
    S.edos = buildEDOGenerators(S.maxEDO);
    render();
  });
  document.getElementById('reset-zoom').addEventListener('click', () => {
    S.viewMin = 0; S.viewMax = 1200;
    updateInfo(); render();
  });
  document.getElementById('selected-panel').addEventListener('mousedown', e => {
    e.stopPropagation();
  });
  document.getElementById('sp-close').addEventListener('click', () => {
    S.selected = null;
    S.generatorCents = null;
    S._panelHeight = null;
    S._circleRadius = null;
    updatePanel(); render();
  });

  // Panel resize handle
  const resizeHandle = document.getElementById('sp-resize-handle');
  let resizing = false, resizeStartY = 0, resizeStartH = 0;

  resizeHandle.addEventListener('mousedown', e => {
    const panel = document.getElementById('selected-panel');
    if (!panel || panel.style.display === 'none') return;
    resizing = true;
    resizeStartY = e.clientY;
    resizeStartH = panel.getBoundingClientRect().height;
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (!resizing) return;
    const dy = resizeStartY - e.clientY;
    S._panelHeight = Math.max(80, Math.min(S.H - 40, resizeStartH + dy));
    positionPanel();
    renderEDOGrid();
  });

  document.addEventListener('mouseup', () => {
    resizing = false;
  });
}

// ================================================================
//  INIT
// ================================================================

function resizeCanvas() {
  const cntr = document.getElementById('canvas-container');
  S.dpr = window.devicePixelRatio || 1;
  S.W = cntr.clientWidth;
  S.H = cntr.clientHeight;
  S.canvas.width = S.W * S.dpr;
  S.canvas.height = S.H * S.dpr;
  S.canvas.style.width = S.W + 'px';
  S.canvas.style.height = S.H + 'px';
}

window.addEventListener('DOMContentLoaded', () => {
  loadSynthSettings();
  S.canvas = document.getElementById('main-canvas');
  S.ctx = S.canvas.getContext('2d');
  resizeCanvas();
  recalc();
  setup();
});
</script>
</body>
